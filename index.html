<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>火場人員管制系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
    <style>
        @keyframes pulse-red {
            0%, 100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; background-color: rgba(239, 68, 68, 0.4); }
            50% { border-color: #ffffff; box-shadow: 0 0 30px #ff0000; background-color: rgba(239, 68, 68, 0.1); }
        }
        @keyframes pulse-orange {
            0%, 100% { border-color: #f59e0b; box-shadow: 0 0 10px #f59e0b; }
            50% { border-color: #ffffff; box-shadow: 0 0 20px #f59e0b; }
        }
        .warning-red { animation: pulse-red 0.8s infinite; border-width: 4px !important; }
        .warning-orange { animation: pulse-orange 1.5s infinite; border-width: 4px !important; }

        body { background-color: #020617; color: #f8fafc; user-select: none; overflow-x: hidden; touch-action: manipulation; }
        
        /* 下拉選單：高對比白字 */
        select { 
            background-color: #1e293b !important; 
            color: #ffffff !important; 
            border: 2px solid #3b82f6 !important; 
            padding: 12px !important;
            font-size: 16px !important; 
            font-weight: 900 !important;
            border-radius: 12px;
            width: 100%;
            display: block;
            appearance: auto !important;
        }

        .sector-btn { transition: all 0.2s; min-height: 120px; border-radius: 1rem; border-width: 2px; cursor: pointer; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .bg-inside { background-color: #111827; border-color: #374151; }
        .bg-outside { background-color: #064e3b; border-color: #065f46; }
        .bg-rit { background-color: #450a0a; border-color: #991b1b; }

        .draggable-team { cursor: grab; padding: 6px; border-radius: 8px; background-color: rgba(0, 0, 0, 0.85); border: 1px solid rgba(255, 255, 255, 0.3); margin-bottom: 4px; }
        .task-tag { padding: 2px 5px; border-radius: 4px; color: white; font-weight: 900; font-size: 10px; margin-right: 4px; }
        
        /* 任務按鈕選取狀態：強化視覺回饋 */
        .task-btn { transition: all 0.2s; opacity: 0.4; border-width: 2px; border-color: transparent; }
        .task-btn.active { opacity: 1 !important; border-color: white !important; transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        .task-滅 { background-color: #ef4444; } .task-搜 { background-color: #f97316; } .task-排 { background-color: #06b6d4; }
        .task-周 { background-color: #3b82f6; } .task-侷 { background-color: #10b981; } .task-殘 { background-color: #92400e; }
        .task-幕 { background-color: #a855f7; } .task-RIT { background-color: #ff0000; border: 1px solid white; }

        .grid-layout { display: grid; grid-template-columns: 90px 1fr 90px; gap: 12px; width: 100%; max-width: 850px; }
    </style>
</head>
<body class="flex flex-col lg:flex-row h-screen">

    <div class="flex-1 flex flex-col p-4 overflow-y-auto">
        <div class="mb-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-red-500 italic tracking-tighter">TACTICAL COMMAND</h1>
                <p id="sync-status" class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">● CHENGGONG FIRE UNIT CONNECTED</p>
            </div>
            <div class="flex gap-2">
                <button onclick="triggerMayday()" class="px-4 py-2 bg-red-600 rounded-xl text-xs font-black shadow-lg">🚨 MAYDAY</button>
                <div class="flex bg-slate-800 rounded-xl p-1 border border-slate-700">
                    <button onclick="changeScene('bungalow')" id="btn-bungalow" class="px-3 py-1 text-[10px] font-bold rounded-lg">平房</button>
                    <button onclick="changeScene('building')" id="btn-building" class="px-3 py-1 text-[10px] font-bold bg-blue-600 rounded-lg text-white">多層</button>
                </div>
            </div>
        </div>

        <div class="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 mb-6 flex gap-6 items-center">
            <div class="flex gap-6 items-center">
                <div class="flex flex-col">
                    <span class="text-[10px] text-slate-500 font-black">樓層 (FLOOR)</span>
                    <div class="flex items-center gap-3 mt-1">
                        <button onclick="adjustFloors(-1)" class="w-8 h-8 bg-slate-800 rounded-full border border-slate-600 text-lg">-</button>
                        <span id="floor-display" class="font-mono text-xl font-black text-blue-400">3</span>
                        <button onclick="adjustFloors(1)" class="w-8 h-8 bg-slate-800 rounded-full border border-slate-600 text-lg">+</button>
                    </div>
                </div>
                <div class="flex flex-col border-l border-slate-800 pl-6">
                    <span class="text-[10px] text-slate-500 font-black">棟數 (UNITS)</span>
                    <div class="flex items-center gap-3 mt-1">
                        <button onclick="adjustUnits(-1)" class="w-8 h-8 bg-slate-800 rounded-full border border-slate-600 text-lg">-</button>
                        <span id="unit-display" class="font-mono text-xl font-black text-emerald-400">1</span>
                        <button onclick="adjustUnits(1)" class="w-8 h-8 bg-slate-800 rounded-full border border-slate-600 text-lg">+</button>
                    </div>
                </div>
            </div>
            
            <div class="flex-1 flex flex-col border-l border-slate-800 pl-6">
                <span class="text-[10px] text-red-500 font-black uppercase">RIT 救援組</span>
                <div id="pos-rit" class="mt-1"></div>
            </div>
        </div>

        <div id="capture-area" class="flex-1 flex items-center justify-center p-2">
            <div class="grid-layout">
                <div class="col-start-2"><div id="pos-back"></div></div>
                <div class="row-start-2 flex items-center"><div id="pos-left" class="w-full"></div></div>
                <div class="row-start-2 col-start-2 p-2 bg-slate-950/30 rounded-3xl border border-slate-800 shadow-inner"><div id="pos-inside"></div></div>
                <div class="row-start-2 col-start-3 flex items-center"><div id="pos-right" class="w-full"></div></div>
                <div class="col-start-2 mt-4"><div id="pos-front"></div></div>
            </div>
        </div>
    </div>

    <div class="w-full lg:w-96 bg-slate-900 border-l border-slate-800 flex flex-col shadow-2xl">
        <div class="p-4 bg-slate-950 flex justify-between items-center border-b border-slate-800">
            <h2 class="font-black text-sm tracking-widest text-slate-400">📋 全場實戰紀錄</h2>
            <span id="team-count" class="bg-blue-600 text-white text-xs px-2 py-0.5 rounded-full font-mono">0</span>
        </div>
        <div id="status-board" class="flex-1 overflow-y-auto p-4 space-y-2 font-mono text-[11px] bg-slate-950/50"></div>
        <div class="p-4 bg-slate-950 border-t border-slate-800 grid grid-cols-2 gap-2">
            <button onclick="exportLogs()" class="py-3 bg-slate-800 text-white rounded-xl text-xs font-black border border-slate-700">匯出 CSV</button>
            <button onclick="captureScreen()" class="py-3 bg-blue-700 text-white rounded-xl text-xs font-black border border-blue-600">戰術截圖</button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden p-4 z-50">
        <div class="bg-slate-900 w-full max-w-md rounded-[2.5rem] border border-slate-700 shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-950">
                <h3 class="text-xl font-black text-white" id="target-title">位置管理</h3>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-800 text-white text-2xl">&times;</button>
            </div>
            
            <div class="p-6 overflow-y-auto space-y-6">
                <div id="current-teams-list" class="space-y-4"></div>
                <div class="pt-6 border-t border-slate-800 space-y-4">
                    <div class="bg-slate-950 p-5 rounded-3xl border border-slate-800 space-y-5">
                        <div class="space-y-2">
                            <label class="text-[10px] text-slate-500 font-black">單位與帶隊官</label>
                            <select id="unit-select" onchange="updateMemberOptions()" class="mb-2"></select>
                            <select id="leader-select" onchange="updateMemberOptions()"></select>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <select id="member-2-select" onchange="updateMemberOptions()"></select>
                            <select id="member-3-select" onchange="updateMemberOptions()"></select>
                        </div>
                        
                        <div class="space-y-2">
                            <div class="grid grid-cols-4 gap-2">
                                <button onclick="setTask('滅火攻擊')" id="btn-滅" class="task-btn py-3 rounded-xl text-[10px] font-black bg-red-600 text-red-100">滅</button>
                                <button onclick="setTask('人命搜救')" id="btn-搜" class="task-btn py-3 rounded-xl text-[10px] font-black bg-orange-600 text-orange-100">搜</button>
                                <button onclick="setTask('通風排煙')" id="btn-排" class="task-btn py-3 rounded-xl text-[10px] font-black bg-cyan-600 text-cyan-100">排</button>
                                <button onclick="setTask('周界防護')" id="btn-周" class="task-btn py-3 rounded-xl text-[10px] font-black bg-blue-600 text-blue-100">周</button>
                            </div>
                            <div class="grid grid-cols-4 gap-2">
                                <button onclick="setTask('侷限火勢')" id="btn-侷" class="task-btn py-3 rounded-xl text-[10px] font-black bg-emerald-600 text-emerald-100">侷</button>
                                <button onclick="setTask('殘火處理')" id="btn-殘" class="task-btn py-3 rounded-xl text-[10px] font-black bg-amber-800 text-amber-100">殘</button>
                                <button onclick="setTask('幕僚作業')" id="btn-幕" class="task-btn py-3 rounded-xl text-[10px] font-black bg-purple-600 text-purple-100">幕</button>
                                <button onclick="setTask('RIT')" id="btn-RIT" class="task-btn py-3 rounded-xl text-[10px] font-black bg-red-900 text-red-200">RIT</button>
                            </div>
                        </div>

                        <div class="flex items-center justify-between p-3 bg-slate-900 rounded-xl border border-slate-800">
                            <span class="text-xs text-slate-300 font-bold">氣瓶監控模式</span>
                            <input type="checkbox" id="air-toggle" checked onchange="toggleAirInput()" class="w-6 h-6 accent-blue-500">
                        </div>

                        <div id="air-input-section" class="space-y-3">
                            <div class="flex justify-between font-black text-[10px]">
                                <span class="text-slate-500 uppercase">START PRESSURE</span>
                                <span id="new-air-val" class="text-emerald-400 text-sm font-mono">250 bar</span>
                            </div>
                            <input type="range" id="new-air-slider" min="0" max="300" step="10" value="250" oninput="document.getElementById('new-air-val').innerText=this.value+' bar'" class="w-full accent-blue-500">
                        </div>
                    </div>
                    <button onclick="submitAssignment()" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl shadow-2xl active:scale-95 transition-all text-lg">DEPLOY / 確定部署</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3K4j2T7zex1jjPzVPoWzf1HBflnE_nu2tzv9m_3BKJbovxgDAY5W9wea5RdWer8QXqEEDZEitCOGB/pub?output=csv';
        let personnelData = {}, currentScene = 'building', floorCount = 3, unitCount = 1, selectedSector = null, selectedTask = '滅火攻擊', deployedTeams = [], logHistory = [];
        const CONSUMPTION_PER_MIN = 10;
        const taskMap = { '滅火攻擊': '滅', '人命搜救': '搜', '通風排煙': '排', '周界防護': '周', '侷限火勢': '侷', '殘火處理': '殘', '幕僚作業': '幕', 'RIT': 'RIT' };

        async function loadPersonnel() {
            try {
                const res = await fetch(GOOGLE_SHEET_CSV_URL);
                const text = await res.text();
                personnelData = {};
                text.split(/\r?\n/).slice(1).forEach(r => {
                    const [u, n] = r.split(',');
                    if (u && n) {
                        const unitKey = u.trim();
                        if (!personnelData[unitKey]) personnelData[unitKey] = [];
                        personnelData[unitKey].push(n.trim());
                    }
                });
            } catch (e) {
                personnelData = { "成功分隊": ["賴君瑋", "鍾昌霖", "蕭易林", "林征利"] };
            }
            populateUnitSelect();
        }

        function populateUnitSelect() {
            const select = document.getElementById('unit-select');
            select.innerHTML = `<option value="ALL">-- 選擇單位 (全部) --</option>` + Object.keys(personnelData).map(u => `<option value="${u}">${u}</option>`).join('');
            updateMemberOptions();
        }

        function updateMemberOptions() {
            const unit = document.getElementById('unit-select').value;
            const lS = document.getElementById('leader-select'), m2S = document.getElementById('member-2-select'), m3S = document.getElementById('member-3-select');
            const cL = lS.value, c2 = m2S.value, c3 = m3S.value;
            const globalDeployed = new Set(); 
            deployedTeams.forEach(t => t.members.forEach(m => globalDeployed.add(m)));
            let pool = (unit === "ALL" ? [].concat(...Object.values(personnelData)) : personnelData[unit] || []).filter(n => !globalDeployed.has(n));
            const render = (el, cur, others) => {
                let opts = [...pool]; if (cur && !opts.includes(cur)) opts.push(cur); 
                opts = opts.filter(n => !others.includes(n));
                el.innerHTML = `<option value="">(人員點擊選擇)</option>` + opts.map(n => `<option value="${n}">${el.id==='leader-select'?'⭐ ':''}${n}</option>`).join('');
                el.value = cur;
            };
            render(lS, cL, [c2, c3]); render(m2S, c2, [cL, c3]); render(m3S, c3, [cL, c2]);
        }

        function calculateAir(team) {
            if (!team.usesAir) return 999;
            const elapsedMins = (Date.now() - team.startTime) / 60000;
            const current = Math.max(0, team.initialAir - Math.floor(elapsedMins * CONSUMPTION_PER_MIN));
            if (current <= 100 && !team.n100) { addLog("氣量警告", `⚠️ [${team.location}] ${team.members.join('、')} 壓力低於 100b`); team.n100 = true; }
            if (current <= 50 && !team.n50) { addLog("緊急回撤", `🆘 [${team.location}] ${team.members.join('、')} 氣壓危急!`); team.n50 = true; }
            return current;
        }

        function createBtn(name, isInside = true) {
            const teams = deployedTeams.filter(t => t.location === name);
            let air50 = teams.some(t => t.usesAir && calculateAir(t) <= 50);
            let air100 = teams.some(t => t.usesAir && calculateAir(t) <= 100);
            let statusClass = air50 ? 'warning-red' : (air100 ? 'warning-orange' : 'border-slate-800');
            let bgColor = isInside ? 'bg-inside' : (name === "RIT救援區" ? 'bg-rit' : 'bg-outside');

            const btn = document.createElement('div');
            btn.className = `sector-btn p-3 w-full ${bgColor} ${statusClass}`;
            btn.onclick = (e) => { if(!e.target.closest('.draggable-team')) openModal(name); };
            btn.setAttribute('ondragover', 'event.preventDefault()');
            btn.setAttribute('ondrop', `handleDrop(event, '${name}')`);

            let content = `<div class="w-full flex justify-between items-center mb-2"><span class="text-[10px] font-black opacity-40 uppercase">${name}</span></div>`;
            teams.forEach(t => {
                const air = calculateAir(t);
                content += `<div class="draggable-team" draggable="true" ondragstart="event.dataTransfer.setData('uid', '${t.uid}')">
                    <div class="flex items-center justify-between">
                        <span class="text-[12px] font-black text-white"><span class="task-tag task-${taskMap[t.task]}">${taskMap[t.task]}</span>${t.leader}</span>
                        <span class="text-[15px] font-black font-mono ${t.usesAir?(air<=50?'text-red-500':'text-emerald-400'):'text-slate-500'}">${t.usesAir?air+'b':'---'}</span>
                    </div>
                </div>`;
            });
            btn.innerHTML = content + (teams.length? '': '<div class="text-[10px] opacity-10 mt-8 text-center w-full italic uppercase">STANDBY</div>');
            return btn;
        }

        function openModal(name) {
            selectedSector = name;
            document.getElementById('target-title').innerText = "位置管理：" + name; 
            const list = document.getElementById('current-teams-list');
            const teams = deployedTeams.filter(t => t.location === name);
            
            list.innerHTML = teams.map(t => {
                const airVal = calculateAir(t);
                return `
                <div class="bg-slate-950 p-5 rounded-3xl border border-slate-700 shadow-xl space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="font-black text-white text-lg">${t.leader} 小組</span>
                        <button onclick="removeTeam('${t.uid}')" class="px-5 py-2 bg-red-600 rounded-xl text-xs font-black text-white">撤離</button>
                    </div>
                    <div class="text-[11px] text-slate-500 font-bold italic">隊員：${t.members.join('、')}</div>
                    ${t.usesAir ? `
                    <div class="space-y-3">
                        <div class="flex justify-between text-[11px] font-black">
                            <span class="text-blue-400">殘氣更新回報</span>
                            <span id="update-air-val-${t.uid}" class="text-emerald-400 font-mono text-lg">${airVal} bar</span>
                        </div>
                        <input type="range" min="0" max="300" step="5" value="${airVal}" 
                               oninput="document.getElementById('update-air-val-${t.uid}').innerText = this.value + ' bar'"
                               onchange="updateAir('${t.uid}', this.value)" 
                               class="w-full h-3 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500">
                    </div>` : '<div class="text-center py-2 text-slate-600 text-[10px] font-black">此組未啟用氣瓶監控</div>'}
                </div>`
            }).join('');
            
            updateMemberOptions();
            document.getElementById('modal').classList.remove('hidden');
        }

        function updateAir(uid, val) {
            const team = deployedTeams.find(t => t.uid === uid);
            if (team) {
                team.initialAir = parseInt(val);
                team.startTime = Date.now();
                team.n100 = (val <= 100); team.n50 = (val <= 50);
                addLog("壓力更新", `📲 ${team.members.join('、')} 更新氣壓為 ${val}b`);
                renderMap(); closeModal();
            }
        }

        function submitAssignment() {
            const l = document.getElementById('leader-select').value; 
            if (!l) { alert('請選擇帶隊官!'); return; }
            const ms = [l]; ["member-2-select", "member-3-select"].forEach(id => { const v = document.getElementById(id).value; if(v) ms.push(v); });
            const uid = 't_' + Date.now();
            deployedTeams.push({ 
                uid, leader: l, members: ms, location: selectedSector, task: selectedTask, 
                usesAir: document.getElementById('air-toggle').checked,
                initialAir: parseInt(document.getElementById('new-air-slider').value), 
                startTime: Date.now(), n100: false, n50: false 
            });
            addLog("戰術指派", `🚀 [${selectedSector}] 指派：${ms.join('、')} (${selectedTask})`); 
            renderMap(); closeModal(); 
        }

        function addLog(action, msg) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            logHistory.push({ time, action, msg });
            const logEl = document.createElement('div');
            logEl.className = "p-3 rounded-2xl bg-slate-800/50 border-l-4 border-blue-500 shadow-sm";
            logEl.innerHTML = `<span class="text-blue-400 font-black text-[10px]">[${time}]</span> <span class="text-white font-black">${action}</span><br><span class="text-slate-400">${msg}</span>`;
            const board = document.getElementById('status-board');
            board.prepend(logEl);
        }

        function handleDrop(e, newLoc) {
            e.preventDefault();
            const uid = e.dataTransfer.getData('uid');
            const team = deployedTeams.find(t => t.uid === uid);
            if (team && team.location !== newLoc) {
                const old = team.location; team.location = newLoc;
                addLog("位置變更", `📍 ${team.members.join('、')}：[${old}] ➔ [${newLoc}]`); 
                renderMap();
            }
        }

        function removeTeam(uid) {
            const idx = deployedTeams.findIndex(t => t.uid === uid);
            if (idx !== -1) {
                const team = deployedTeams[idx];
                addLog("任務撤離", `🔙 ${team.members.join('、')} 已從 [${team.location}] 撤離`);
                deployedTeams.splice(idx, 1);
                renderMap(); closeModal();
            }
        }

        function renderMap() {
            ['pos-front', 'pos-back', 'pos-left', 'pos-right', 'pos-inside', 'pos-rit'].forEach(id => document.getElementById(id).innerHTML = '');
            document.getElementById('pos-front').appendChild(createBtn("第一面(前)", false));
            document.getElementById('pos-back').appendChild(createBtn("第三面(後)", false));
            document.getElementById('pos-left').appendChild(createBtn("第二面(左)", false));
            document.getElementById('pos-right').appendChild(createBtn("第四面(右)", false));
            document.getElementById('pos-rit').appendChild(createBtn("RIT救援區", false));

            const inside = document.getElementById('pos-inside');
            if (currentScene === 'bungalow') {
                inside.className = "grid grid-cols-2 gap-3"; 
                ["後左區域", "後右區域", "前左區域", "前右區域"].forEach(q => inside.appendChild(createBtn(q)));
            } else {
                // 多棟顯示邏輯修復
                inside.style.display = 'grid'; 
                inside.style.gridTemplateColumns = `repeat(${unitCount}, 1fr)`; 
                inside.style.gap = '8px';
                for (let f = floorCount; f >= 1; f--) {
                    for (let u = 0; u < unitCount; u++) {
                        const label = (unitCount > 1 ? String.fromCharCode(65 + u) + '棟 ' : '') + f + 'F';
                        inside.appendChild(createBtn(label));
                    }
                }
            }
            document.getElementById('team-count').innerText = deployedTeams.length;
        }

        function triggerMayday() {
            document.body.style.backgroundColor = document.body.style.backgroundColor === 'red' ? '#020617' : 'red';
            addLog("MAYDAY", "🚩 啟動 MAYDAY 求救信號！確認全場人員狀況！");
        }

        // 任務按鈕選取色塊修復
        function setTask(t) { 
            selectedTask = t; 
            document.querySelectorAll('.task-btn').forEach(b => {
                if (b.id === 'btn-' + taskMap[t]) {
                    b.classList.add('active');
                } else {
                    b.classList.remove('active');
                }
            });
        }

        function toggleAirInput() { document.getElementById('air-input-section').style.display = document.getElementById('air-toggle').checked ? 'block' : 'none'; }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function changeScene(t) { 
            currentScene = t; 
            document.getElementById('btn-building').className = t==='building' ? 'px-3 py-1 text-[10px] font-bold bg-blue-600 rounded-lg text-white' : 'px-3 py-1 text-[10px] font-bold rounded-lg text-slate-400';
            document.getElementById('btn-bungalow').className = t==='bungalow' ? 'px-3 py-1 text-[10px] font-bold bg-blue-600 rounded-lg text-white' : 'px-3 py-1 text-[10px] font-bold rounded-lg text-slate-400';
            renderMap(); 
        }
        function adjustFloors(d) { floorCount = Math.max(1, Math.min(10, floorCount + d)); document.getElementById('floor-display').innerText = floorCount; renderMap(); }
        // 棟數調整函式修復
        function adjustUnits(d) { unitCount = Math.max(1, Math.min(5, unitCount + d)); document.getElementById('unit-display').innerText = unitCount; renderMap(); }

        function exportLogs() {
            let csv = "\uFEFF時間,動作,詳情\n";
            logHistory.forEach(r => csv += `"${r.time}","${r.action}","${r.msg}"\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `FireLog.csv`; a.click();
        }
        async function captureScreen() {
            const canvas = await html2canvas(document.body, { backgroundColor: "#020617" });
            const a = document.createElement("a"); a.href = canvas.toDataURL(); a.download = `TacticalBoard.png`; a.click();
        }

        setInterval(() => { 
            document.getElementById('current-clock').innerText = new Date().toLocaleTimeString([], {hour12: false}); 
            renderMap(); 
        }, 1000);
        
        window.onload = () => { loadPersonnel(); setTask('滅火攻擊'); renderMap(); };
    </script>
</body>
</html>
