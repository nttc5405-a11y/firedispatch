<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>火場戰術管制系統 - 成功分隊實戰版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
    <style>
        @keyframes pulse-red {
            0%, 100% { border-color: #ff0000; box-shadow: inset 0 0 15px #7f0000; background-color: rgba(239, 68, 68, 0.4); }
            50% { border-color: #ffffff; box-shadow: inset 0 0 30px #ff0000; background-color: rgba(239, 68, 68, 0.1); }
        }
        @keyframes pulse-orange {
            0%, 100% { border-color: #f59e0b; box-shadow: inset 0 0 10px #78350f; }
            50% { border-color: #fbbf24; box-shadow: inset 0 0 25px #f59e0b; }
        }
        .warning-red { animation: pulse-red 0.8s infinite; border-width: 4px !important; }
        .warning-orange { animation: pulse-orange 1.5s infinite; border-width: 4px !important; }

        body { background-color: #020617; color: #f8fafc; user-select: none; overflow: hidden; touch-action: manipulation; }
        
        /* 修正：大幅強化下拉選單對比度 */
        select { 
            background-color: #1e293b !important; /* 較亮的深藍底 */
            color: #ffffff !important; /* 純白字 */
            border: 2px solid #3b82f6 !important; /* 顯眼的藍色邊框 */
            padding: 10px !important;
            font-size: 16px !important; /* 防止 iOS 自動縮放 */
            border-radius: 8px;
            width: 100%;
            appearance: auto !important; /* 恢復部分原生樣式確保看得到箭頭 */
        }
        select option {
            background-color: #0f172a;
            color: #ffffff;
        }

        .bg-inside { background-color: #0f172a; border-color: #334155; }
        .bg-outside { background-color: #064e3b; border-color: #065f46; }
        .bg-rit { background-color: #450a0a; border-color: #991b1b; }

        .sector-btn { transition: all 0.2s; min-height: 125px; border-radius: 1rem; border-width: 2px; cursor: pointer; display: flex; flex-direction: column; position: relative; }
        .grid-layout { display: grid; grid-template-columns: 100px 1fr 100px; gap: 16px; width: 100%; max-width: 800px; }
        
        .draggable-team { cursor: grab; padding: 6px; border-radius: 8px; background-color: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.2); margin-bottom: 6px; }
        .task-tag { padding: 2px 6px; border-radius: 4px; color: white; font-weight: 900; font-size: 10px; margin-right: 4px; }
        
        .task-滅 { background-color: #ef4444; } .task-搜 { background-color: #f97316; } 
        .task-周 { background-color: #3b82f6; } .task-RIT { background-color: #dc2626; border: 1px solid white; }
    </style>
</head>
<body class="flex flex-col lg:flex-row h-screen">

    <div class="flex-1 flex flex-col p-4 overflow-y-auto">
        <div class="mb-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-red-500 italic tracking-tighter">TACTICAL COMMAND</h1>
                <p id="sync-status" class="text-[10px] text-emerald-500 font-bold">● 已連線分隊資料庫</p>
            </div>
            <div class="flex gap-2">
                <button onclick="triggerMayday()" class="px-4 py-2 bg-red-600 rounded-lg text-xs font-black shadow-lg">🚨 MAYDAY</button>
                <div class="flex bg-slate-800 rounded-lg p-1">
                    <button onclick="changeScene('bungalow')" id="btn-bungalow" class="px-3 py-1 text-[10px] font-bold rounded">平房</button>
                    <button onclick="changeScene('building')" id="btn-building" class="px-3 py-1 text-[10px] font-bold bg-blue-600 rounded">多層</button>
                </div>
            </div>
        </div>

        <div class="bg-slate-900/50 p-3 rounded-2xl border border-slate-800 mb-6 flex gap-6 items-center">
            <div class="flex flex-col">
                <span class="text-[9px] text-slate-500 font-bold uppercase">樓層設定</span>
                <div class="flex items-center gap-3">
                    <button onclick="adjustFloors(-1)" class="w-8 h-8 bg-slate-800 rounded-full border border-slate-700">-</button>
                    <span id="floor-display" class="font-mono text-xl font-black text-blue-400">3</span>
                    <button onclick="adjustFloors(1)" class="w-8 h-8 bg-slate-800 rounded-full border border-slate-700">+</button>
                </div>
            </div>
            <div id="rit-zone" class="flex-1 flex flex-col border-l border-slate-800 pl-6">
                <span class="text-[9px] text-red-500 font-bold uppercase">RIT 預置救援組</span>
                <div id="pos-rit" class="mt-1"></div>
            </div>
        </div>

        <div id="capture-area" class="flex-1 flex items-center justify-center p-4">
            <div class="grid-layout">
                <div class="col-start-2"><div id="pos-back"></div></div>
                <div class="row-start-2 flex items-center"><div id="pos-left" class="w-full"></div></div>
                <div class="row-start-2 col-start-2"><div id="pos-inside"></div></div>
                <div class="row-start-2 col-start-3 flex items-center"><div id="pos-right" class="w-full"></div></div>
                <div class="col-start-2 mt-2"><div id="pos-front"></div></div>
            </div>
        </div>
    </div>

    <div class="w-full lg:w-80 bg-slate-900 border-l border-slate-800 flex flex-col shadow-2xl">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950">
            <h2 class="font-black text-sm tracking-widest text-slate-400">📋 全場實戰紀錄</h2>
            <span id="team-count" class="bg-blue-600 text-white text-xs px-2 py-0.5 rounded-full font-mono">0</span>
        </div>
        <div id="status-board" class="flex-1 overflow-y-auto p-4 space-y-2 text-[11px] font-mono"></div>
        <div class="p-4 bg-slate-950 border-t border-slate-800 grid grid-cols-2 gap-2">
            <button onclick="exportLogs()" class="py-2 bg-slate-800 rounded-lg text-[10px] font-bold border border-slate-700 text-white">匯出 CSV</button>
            <button onclick="captureScreen()" class="py-2 bg-blue-600 rounded-lg text-[10px] font-bold border border-blue-500 text-white">截圖</button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden p-4 z-50">
        <div class="bg-slate-900 w-full max-w-md rounded-3xl border border-slate-700 shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-black text-white" id="target-sector-title">位置管理</h3>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-800 text-white text-2xl">&times;</button>
            </div>
            
            <div class="p-6 overflow-y-auto space-y-6">
                <div id="current-teams-list" class="space-y-3"></div>

                <div class="pt-6 border-t border-slate-800">
                    <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 space-y-4">
                        <div class="space-y-1">
                            <label class="text-[10px] text-slate-400 font-black">單位選擇</label>
                            <select id="unit-select" onchange="updateMemberOptions()"></select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] text-blue-400 font-black">⭐ 帶隊官 (必選)</label>
                            <select id="leader-select" onchange="updateMemberOptions()"></select>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="space-y-1">
                                <label class="text-[10px] text-slate-400 font-black">組員 1</label>
                                <select id="member-2-select" onchange="updateMemberOptions()"></select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] text-slate-400 font-black">組員 2</label>
                                <select id="member-3-select" onchange="updateMemberOptions()"></select>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-4 gap-2 py-2">
                            <button onclick="setTask('滅火攻擊')" id="btn-滅" class="task-btn py-3 rounded-xl border-2 border-transparent text-[10px] font-black bg-red-600/20 text-red-100">滅</button>
                            <button onclick="setTask('人命搜救')" id="btn-搜" class="task-btn py-3 rounded-xl border-2 border-transparent text-[10px] font-black bg-orange-600/20 text-orange-100">搜</button>
                            <button onclick="setTask('周界防護')" id="btn-周" class="task-btn py-3 rounded-xl border-2 border-transparent text-[10px] font-black bg-blue-600/20 text-blue-100">周</button>
                            <button onclick="setTask('RIT')" id="btn-RIT" class="task-btn py-3 rounded-xl border-2 border-transparent text-[10px] font-black bg-red-900/40 text-red-200">RIT</button>
                        </div>

                        <div id="air-input-section" class="space-y-2">
                            <div class="flex justify-between font-black text-[10px]">
                                <span class="text-slate-500">起始氣量 (BAR)</span>
                                <span id="new-air-val" class="text-emerald-400 text-sm font-mono">250 bar</span>
                            </div>
                            <input type="range" id="new-air-slider" min="0" max="300" step="10" value="250" oninput="document.getElementById('new-air-val').innerText=this.value+' bar'" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-blue-500">
                        </div>
                    </div>
                    <button onclick="submitAssignment()" class="w-full mt-6 py-4 bg-blue-600 text-white font-black rounded-2xl shadow-xl active:scale-95 transition-all">部署此小組</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3K4j2T7zex1jjPzVPoWzf1HBflnE_nu2tzv9m_3BKJbovxgDAY5W9wea5RdWer8QXqEEDZEitCOGB/pub?output=csv';
        let personnelData = {}, currentScene = 'building', floorCount = 3, selectedSector = null, selectedTask = '滅火攻擊', deployedTeams = [], logHistory = [];
        const CONSUMPTION_PER_MIN = 10, REPORT_INTERVAL = 10 * 60 * 1000;
        const taskMap = { '滅火攻擊': '滅', '人命搜救': '搜', '周界防護': '周', 'RIT': 'RIT' };

        async function loadPersonnel() {
            try {
                const res = await fetch(GOOGLE_SHEET_CSV_URL);
                const text = await res.text();
                personnelData = {};
                text.split(/\r?\n/).slice(1).forEach(r => {
                    const [u, n] = r.split(',');
                    if (u && n) {
                        const unitKey = u.trim();
                        if (!personnelData[unitKey]) personnelData[unitKey] = [];
                        personnelData[unitKey].push(n.trim());
                    }
                });
            } catch (e) {
                personnelData = { "成功分隊": ["賴君瑋", "鍾昌霖", "蕭易林", "林征利"] };
            }
            populateUnitSelect();
        }

        function populateUnitSelect() {
            const select = document.getElementById('unit-select');
            select.innerHTML = `<option value="ALL">-- 全部單位 --</option>` + Object.keys(personnelData).map(u => `<option value="${u}">${u}</option>`).join('');
            updateMemberOptions();
        }

        function updateMemberOptions() {
            const unit = document.getElementById('unit-select').value;
            const lS = document.getElementById('leader-select'), m2S = document.getElementById('member-2-select'), m3S = document.getElementById('member-3-select');
            const cL = lS.value, c2 = m2S.value, c3 = m3S.value;
            const globalDeployed = new Set(); 
            deployedTeams.forEach(t => t.members.forEach(m => globalDeployed.add(m)));
            let pool = (unit === "ALL" ? [].concat(...Object.values(personnelData)) : personnelData[unit] || []).filter(n => !globalDeployed.has(n));
            const render = (el, cur, others) => {
                let opts = [...pool]; if (cur && !opts.includes(cur)) opts.push(cur); 
                opts = opts.filter(n => !others.includes(n));
                el.innerHTML = `<option value="">(點擊選擇人員)</option>` + opts.map(n => `<option value="${n}">${el.id==='leader-select'?'⭐ ':''}${n}</option>`).join('');
                el.value = cur;
            };
            render(lS, cL, [c2, c3]); render(m2S, c2, [cL, c3]); render(m3S, c3, [cL, c2]);
        }

        function calculateAir(team) {
            const elapsedMins = (Date.now() - team.startTime) / 60000;
            const current = Math.max(0, team.initialAir - Math.floor(elapsedMins * CONSUMPTION_PER_MIN));
            if (current <= 100 && !team.n100) { addLog("氣量警告", `⚠️ [${team.location}] ${team.members.join('、')} 壓力低於 100b`); team.n100 = true; }
            if (current <= 50 && !team.n50) { addLog("緊急撤離", `🆘 [${team.location}] ${team.members.join('、')} 氣量危急！`); team.n50 = true; }
            return current;
        }

        function createBtn(name, isInside = true) {
            const teams = deployedTeams.filter(t => t.location === name);
            let air50 = teams.some(t => calculateAir(t) <= 50);
            let air100 = teams.some(t => calculateAir(t) <= 100);
            let statusClass = air50 ? 'warning-red' : (air100 ? 'warning-orange' : '');
            let bgColor = isInside ? 'bg-inside' : (name === "RIT救援區" ? 'bg-rit' : 'bg-outside');

            const btn = document.createElement('div');
            btn.className = `sector-btn p-3 w-full ${bgColor} ${statusClass} border-slate-700`;
            btn.onclick = (e) => { if(!e.target.closest('.draggable-team')) openModal(name); };
            
            // 修正：確保拖放事件生效
            btn.setAttribute('ondragover', 'event.preventDefault()');
            btn.setAttribute('ondrop', `handleDrop(event, '${name}')`);

            let content = `<div class="w-full flex justify-between items-center mb-2"><span class="text-[10px] font-black opacity-50 uppercase">${name}</span></div>`;
            teams.forEach(t => {
                const air = calculateAir(t);
                content += `<div class="draggable-team" draggable="true" ondragstart="event.dataTransfer.setData('uid', '${t.uid}')">
                    <div class="flex items-center justify-between">
                        <span class="text-[12px] font-black text-white"><span class="task-tag task-${taskMap[t.task]}">${taskMap[t.task]}</span>${t.leader}</span>
                        <span class="text-[15px] font-black font-mono ${air<=50?'text-red-500':'text-emerald-400'}">${air}b</span>
                    </div>
                </div>`;
            });
            btn.innerHTML = content + (teams.length? '': '<div class="text-[10px] opacity-20 mt-8 text-center w-full italic font-bold tracking-widest uppercase">Standby</div>');
            return btn;
        }

        function handleDrop(e, newLoc) {
            e.preventDefault();
            const uid = e.dataTransfer.getData('uid');
            const team = deployedTeams.find(t => t.uid === uid);
            if (team && team.location !== newLoc) {
                const old = team.location; 
                team.location = newLoc;
                addLog("位置移動", `📍 ${team.members.join('、')} 從 [${old}] ➔ [${newLoc}]`); 
                renderMap();
            }
        }

        function openModal(name) {
            selectedSector = name; // 核心修正：正確紀錄目前點擊的區域
            document.getElementById('target-sector-title').innerText = "位置管理：" + name; 
            const list = document.getElementById('current-teams-list');
            const teams = deployedTeams.filter(t => t.location === name);
            list.innerHTML = teams.map(t => `
                <div class="bg-slate-800 p-4 rounded-2xl flex justify-between items-center border border-slate-700">
                    <div>
                        <p class="font-black text-white">${t.leader} 小組</p>
                        <p class="text-[10px] text-slate-400">全員：${t.members.join('、')}</p>
                    </div>
                    <button onclick="removeTeam('${t.uid}')" class="px-4 py-2 bg-red-600 rounded-lg text-xs font-bold text-white">撤離</button>
                </div>
            `).join('');
            updateMemberOptions();
            document.getElementById('modal').classList.remove('hidden');
        }

        function submitAssignment() {
            const l = document.getElementById('leader-select').value; 
            if (!l) { alert('請選擇帶隊官！'); return; }
            if (!selectedSector) { alert('區域錯誤，請重新開啟視窗'); return; }

            const ms = [l]; 
            ["member-2-select", "member-3-select"].forEach(id => { 
                const v = document.getElementById(id).value; if(v) ms.push(v); 
            });
            
            const uid = 't_' + Date.now();
            deployedTeams.push({ 
                uid, leader: l, members: ms, location: selectedSector, task: selectedTask, 
                initialAir: parseInt(document.getElementById('new-air-slider').value), 
                startTime: Date.now(), n100: false, n50: false 
            });
            
            addLog("戰術指派", `🚀 [${selectedSector}] 指派：${ms.join('、')} (${selectedTask})`); 
            renderMap();
            closeModal(); 
        }

        function removeTeam(uid) {
            const idx = deployedTeams.findIndex(t => t.uid === uid);
            if (idx !== -1) {
                const team = deployedTeams[idx];
                addLog("人員撤離", `🔙 ${team.members.join('、')} 已從 [${team.location}] 安全撤離`);
                deployedTeams.splice(idx, 1);
                renderMap(); closeModal();
            }
        }

        function addLog(action, msg) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            logHistory.push({ time, action, msg });
            const logEl = document.createElement('div');
            logEl.className = "p-2 rounded-lg bg-slate-800/50 border-l-4 border-blue-500 mb-2";
            logEl.innerHTML = `<span class="text-blue-400 font-bold">[${time}]</span> <span class="text-white font-bold">${action}</span><br><span class="text-slate-300">${msg}</span>`;
            const board = document.getElementById('status-board');
            board.prepend(logEl);
        }

        function renderMap() {
            ['pos-front', 'pos-back', 'pos-left', 'pos-right', 'pos-inside', 'pos-rit'].forEach(id => document.getElementById(id).innerHTML = '');
            document.getElementById('pos-front').appendChild(createBtn("第一面(前)", false));
            document.getElementById('pos-back').appendChild(createBtn("第三面(後)", false));
            document.getElementById('pos-left').appendChild(createBtn("第二面(左)", false));
            document.getElementById('pos-right').appendChild(createBtn("第四面(右)", false));
            document.getElementById('pos-rit').appendChild(createBtn("RIT救援區", false));

            const inside = document.getElementById('pos-inside');
            if (currentScene === 'bungalow') {
                inside.className = "grid grid-cols-2 gap-4"; 
                ["內部-左後", "內部-右後", "內部-左前", "內部-右前"].forEach(q => inside.appendChild(createBtn(q)));
            } else {
                inside.style.display = 'grid'; inside.style.gridTemplateColumns = `repeat(1, 1fr)`; inside.style.gap = '8px';
                for (let f = floorCount; f >= 1; f--) {
                    inside.appendChild(createBtn(f + 'F'));
                }
            }
            document.getElementById('team-count').innerText = deployedTeams.length;
        }

        function triggerMayday() {
            document.body.style.backgroundColor = document.body.style.backgroundColor === 'red' ? '#020617' : 'red';
            addLog("緊急宣告", "🚩 MAYDAY! MAYDAY! MAYDAY!");
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); selectedSector = null; }
        function setTask(t) { 
            selectedTask = t; 
            document.querySelectorAll('.task-btn').forEach(b => b.style.borderColor = b.id === 'btn-'+t ? '#fff' : 'transparent'); 
        }
        function changeScene(t) { 
            currentScene = t; 
            document.getElementById('btn-building').className = t==='building' ? 'px-3 py-1 text-[10px] font-bold bg-blue-600 rounded' : 'px-3 py-1 text-[10px] font-bold rounded';
            document.getElementById('btn-bungalow').className = t==='bungalow' ? 'px-3 py-1 text-[10px] font-bold bg-blue-600 rounded' : 'px-3 py-1 text-[10px] font-bold rounded';
            renderMap(); 
        }
        function adjustFloors(d) { floorCount = Math.max(1, Math.min(10, floorCount + d)); document.getElementById('floor-display').innerText = floorCount; renderMap(); }
        function exportLogs() {
            let csv = "\uFEFF時間,動作,詳情\n";
            logHistory.forEach(r => csv += `"${r.time}","${r.action}","${r.msg}"\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `FireLog_${Date.now()}.csv`; a.click();
        }
        async function captureScreen() {
            const canvas = await html2canvas(document.body, { backgroundColor: "#020617" });
            const a = document.createElement("a"); a.href = canvas.toDataURL(); a.download = `TacticalBoard_${Date.now()}.png`; a.click();
        }

        setInterval(() => { 
            document.getElementById('current-clock').innerText = new Date().toLocaleTimeString([], {hour12: false}); 
            renderMap(); 
        }, 1000);
        
        window.onload = () => { loadPersonnel(); setTask('滅火攻擊'); renderMap(); };
    </script>
</body>
</html>
