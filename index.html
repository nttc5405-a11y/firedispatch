<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>火場人員管制系統 - ICS 實戰版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @keyframes pulse-red {
            0%, 100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; background-color: rgba(239, 68, 68, 0.4); }
            50% { border-color: #ffffff; box-shadow: 0 0 30px #ff0000; background-color: rgba(239, 68, 68, 0.1); }
        }
        @keyframes pulse-orange {
            0%, 100% { border-color: #f59e0b; box-shadow: 0 0 10px #f59e0b; }
            50% { border-color: #ffffff; box-shadow: 0 0 20px #f59e0b; }
        }
        .warning-red { animation: pulse-red 1.5s infinite; border-width: 4px !important; }
        .warning-orange { animation: pulse-orange 2s infinite; border-width: 4px !important; }

        body { background-color: #020617; color: #f8fafc; user-select: none; overflow-x: hidden; touch-action: manipulation; }
        
        select { 
            background-color: #1e293b !important; 
            color: #ffffff !important; 
            border: 2px solid #3b82f6 !important; 
            padding: 12px !important;
            font-size: 16px !important; 
            font-weight: 900 !important;
            border-radius: 12px;
            width: 100%;
            display: block;
            appearance: auto !important;
        }
        optgroup { background-color: #0f172a; color: #60a5fa; font-style: normal; font-weight: 900; }

        .sector-btn { transition: all 0.2s; min-height: 120px; border-radius: 1rem; border-width: 2px; cursor: pointer; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .bg-inside { background-color: #111827; border-color: #374151; }
        .bg-outside { background-color: #064e3b; border-color: #065f46; }
        .bg-rit { background-color: #450a0a; border-color: #991b1b; border-style: dashed; }
        .bg-basement { background-color: #1f2937; border-color: #4b5563; }
        .bg-staging { background-color: #0f172a; border-color: #3b82f6; border-style: dashed; }

        .draggable-team { cursor: grab; padding: 6px; border-radius: 8px; background-color: rgba(0, 0, 0, 0.85); border: 1px solid rgba(255, 255, 255, 0.3); margin-bottom: 4px; }
        .task-tag { padding: 2px 5px; border-radius: 4px; color: white; font-weight: 900; font-size: 10px; margin-right: 4px; }
        
        .task-btn { transition: all 0.2s; opacity: 0.4; border-width: 2px; border-color: transparent; }
        .task-btn.active { opacity: 1 !important; border-color: white !important; transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        .task-滅 { background-color: #ef4444; } .task-搜 { background-color: #f97316; } .task-排 { background-color: #06b6d4; }
        .task-周 { background-color: #3b82f6; } .task-侷 { background-color: #10b981; } .task-殘 { background-color: #92400e; }
        .task-幕 { background-color: #a855f7; } .task-RIT { background-color: #ff0000; border: 1px solid white; }
        .task-待 { background-color: #64748b; border: 1px dashed white; color: #fff; }

        .grid-layout { display: grid; grid-template-columns: 90px 1fr 90px; gap: 12px; width: 100%; max-width: 850px; }
    </style>
</head>
<body class="flex flex-col lg:flex-row h-screen" onclick="initAudioOnce()">

    <script>
        // 🚨 記得把這裡替換成你的 Google Apps Script 網址！ 🚨
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzyria_wPsV2xX4lzWQOBBSo5jIWRvEbcUMdXse5IfQEHbsJH_gJWJhwDv6xDlfFdlMVQ/exec'; 

        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3K4j2T7zex1jjPzVPoWzf1HBflnE_nu2tzv9m_3BKJbovxgDAY5W9wea5RdWer8QXqEEDZEitCOGB/pub?output=csv';
        let personnelData = {}, floorCount = 1, basementCount = 0, unitCount = 1, selectedSector = null, selectedTask = '滅火攻擊', deployedTeams = [], logHistory = [];
        let editingTeamUid = null; 
        const CONSUMPTION_PER_MIN = 10;
        const taskMap = { '滅火攻擊': '滅', '人命搜救': '搜', '通風排煙': '排', '周界防護': '周', '侷限火勢': '侷', '殘火處理': '殘', '幕僚作業': '幕', 'RIT': 'RIT', '待命集結': '待' };

        // ================= 案件編號邏輯 =================
        const d = new Date();
        let SESSION_NAME = '火警_' + 
            String(d.getMonth()+1).padStart(2, '0') + 
            String(d.getDate()).padStart(2, '0') + '_' + 
            String(d.getHours()).padStart(2, '0') + 
            String(d.getMinutes()).padStart(2, '0');
            
        document.getElementById('incident-id-input').value = SESSION_NAME; // 預設填入當前時間

        function updateSessionName() {
            const input = document.getElementById('incident-id-input').value.trim();
            if (input) {
                SESSION_NAME = input;
                addLog("系統", `📝 案件編號 (存檔分頁) 設定為: ${SESSION_NAME}`);
            }
        }

        // ================= 音效處理 =================
        let audioCtx;
        function initAudioOnce() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const buffer = audioCtx.createBuffer(1, 1, 22050);
                const source = audioCtx.createBufferSource();
                source.buffer = buffer; 
                source.connect(audioCtx.destination); 
                source.start(0);
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep(freq, type, duration, vol=0.1) {
            try {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type; 
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain); 
                gain.connect(audioCtx.destination);
                osc.start(); 
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function playSound(type) {
            if (!audioCtx) return;
            if (type === 'sync') {
                playBeep(1200, 'sine', 0.1, 0.05); // 同步或掃碼成功的滴聲
            }
            if (type === 'warn') { 
                playBeep(880, 'square', 0.2, 0.15); 
                setTimeout(()=>playBeep(880, 'square', 0.2, 0.15), 300); 
            }
            if (type === 'danger') { 
                playBeep(440, 'sawtooth', 0.5, 0.2); 
                setTimeout(()=>playBeep(440, 'sawtooth', 0.5, 0.2), 600); 
            }
            if (type === 'mayday') { 
                const interval = setInterval(() => { 
                    playBeep(1000, 'square', 0.4, 0.3); 
                    setTimeout(()=>playBeep(600, 'square', 0.4, 0.3), 500); 
                }, 1000);
                setTimeout(() => clearInterval(interval), 5000);
            }
        }

                text.split(/\r?\n/).slice(1).forEach(r => {

        // ================= QR 掃描器邏輯 =================
        let html5QrCode;
        let lastScannedData = ""; 
        let lastScanTime = 0;
        let scanResultTimer; // 用來控制視覺提示文字的淡出

        function startScanner() {
            initAudioOnce();
            document.getElementById('scanner-modal').classList.remove('hidden');
            
            // 清空先前的提示文字
            document.getElementById('scan-result').innerText = "";
            document.getElementById('scan-result').classList.add('opacity-0');
            
            html5QrCode = new Html5Qrcode("reader");
            
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    const now = Date.now();
                    // 防重複掃描機制 (2秒內不重複掃同一人)
                    if (decodedText === lastScannedData && (now - lastScanTime) < 2000) return;
                    
                    lastScannedData = decodedText;
                    lastScanTime = now;

                    const data = decodedText.split(',');
                    if (data.length >= 2) {
                        const unit = data[0].trim();
                        const name = data[1].trim();
                        
                        if (!personnelData[unit]) personnelData[unit] = [];
                        
                        // 🌟 強烈的視覺回饋 🌟
                        const resultEl = document.getElementById('scan-result');
                        
                        if (!personnelData[unit].includes(name)) {
                            personnelData[unit].push(name);
                            populateUnitSelect();
                            addLog("人員報到", `✅ [掃碼成功] ${unit} ${name}`);
                            playSound('sync');
                            
                            // 顯示綠色成功文字
                            resultEl.innerText = `✅ 成功登錄：${name}`;
                            resultEl.className = "text-emerald-400 font-black text-2xl mt-6 h-8 transition-opacity duration-300 tracking-widest drop-shadow-[0_0_10px_rgba(16,185,129,0.8)]";
                            
                        } else {
                            addLog("系統提醒", `ℹ️ [重複報到] ${unit} ${name} 已在名單中`);
                            
                            // 顯示黃色重複文字
                            resultEl.innerText = `⚠️ 重複掃描：${name}`;
                            resultEl.className = "text-yellow-400 font-black text-2xl mt-6 h-8 transition-opacity duration-300 tracking-widest drop-shadow-[0_0_10px_rgba(250,204,21,0.8)]";
                        }
                        
                        // 讓文字浮現後，2秒自動消失
                        clearTimeout(scanResultTimer);
                        scanResultTimer = setTimeout(() => {
                            resultEl.classList.add('opacity-0');
                        }, 2000);
                    }
                },
                (errorMessage) => { /* 背景掃描中，不處理錯誤以防洗版 */ }
            ).catch(err => { 
                alert("無法啟動相機，請確認已給予相機權限！"); 
                stopScanner(); 
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scanner-modal').classList.add('hidden');
                }).catch(err => {
                    document.getElementById('scanner-modal').classList.add('hidden');
                });
            } else {
                document.getElementById('scanner-modal').classList.add('hidden');
            }
        }

        function populateUnitSelect() {
            const select = document.getElementById('unit-select');
            select.innerHTML = `<option value="ALL">-- 選擇單位 (全部) --</option>` + Object.keys(personnelData).map(u => `<option value="${u}">${u}</option>`).join('');

        function updateMemberOptions() {
            const unit = document.getElementById('unit-select').value;
            const lS = document.getElementById('leader-select');
            const m2S = document.getElementById('member-2-select');
            const m3S = document.getElementById('member-3-select');
            const m4S = document.getElementById('member-4-select'); 
            
            const currentSelectedInModal = [lS.value, m2S.value, m3S.value, m4S.value].filter(v => v !== "");

            const globalDeployed = new Set(); 
            deployedTeams.forEach(t => { 
                if (t.uid !== editingTeamUid) { t.members.forEach(m => globalDeployed.add(m)); }
            });

            let availablePersonnel = [];
            if (unit === "ALL") {
                availablePersonnel = [].concat(...Object.values(personnelData)).filter(name => !globalDeployed.has(name) || currentSelectedInModal.includes(name));
            } else {
                availablePersonnel = (personnelData[unit] || []).filter(name => !globalDeployed.has(name) || currentSelectedInModal.includes(name));
            }

            const render = (el, otherSelected) => {
                let html = `<option value="">(點選名單)</option>`;
                if (unit === "ALL") {
                    for (let u in personnelData) {
                        let availableInUnit = personnelData[u].filter(n => availablePersonnel.includes(n) && !otherSelected.includes(n));
                        if (availableInUnit.length > 0) {
                            html += `<optgroup label="[${u}]">`;
                            html += availableInUnit.map(n => `<option value="${n}">${el.id==='leader-select'?'⭐ ':''}${n}</option>`).join('');
                            html += `</optgroup>`;
                        }
                    }
                } else {
                    let finalOptions = availablePersonnel.filter(n => !otherSelected.includes(n));
                    html += finalOptions.map(n => `<option value="${n}">${el.id==='leader-select'?'⭐ ':''}${n}</option>`).join('');
                }
                const prevVal = el.value;
                el.innerHTML = html;
                el.value = prevVal;
            };

            render(lS, [m2S.value, m3S.value, m4S.value]);
            render(m2S, [lS.value, m3S.value, m4S.value]);
            render(m3S, [lS.value, m2S.value, m4S.value]);
            render(m4S, [lS.value, m2S.value, m3S.value]);
        }

        function getAirStatus(team) {
            if (!team.usesAir) return "";
            const elapsedMins = (Date.now() - team.startTime) / 60000;
            const current = Math.max(0, team.initialAir - Math.floor(elapsedMins * CONSUMPTION_PER_MIN));
            return ` (氣壓:${current}b)`;
        }

        function calculateAir(team) {
            if (!team.usesAir) return 999;
            const elapsedMins = (Date.now() - team.startTime) / 60000;
            const current = Math.max(0, team.initialAir - Math.floor(elapsedMins * CONSUMPTION_PER_MIN));
            
            if (current <= 100 && !team.n100) { 
                addLog("氣量警告", `⚠️ [${team.location}] ${team.members.join('、')} 壓力低於 100b (目前:${current}b)`); 
                team.n100 = true; 
                playSound('warn'); 
            }
            if (current <= 50 && !team.n50) { 
                addLog("緊急回撤", `🆘 [${team.location}] ${team.members.join('、')} 氣壓危急!`); 
                team.n50 = true; 
                playSound('danger'); 
            }
            return current;
        }

        function createBtn(name, isInside = true) {
            const teams = deployedTeams.filter(t => t.location === name);
            let air50 = teams.some(t => t.usesAir && calculateAir(t) <= 50);
            let air100 = teams.some(t => t.usesAir && calculateAir(t) <= 100);
            let statusClass = air50 ? 'warning-red' : (air100 ? 'warning-orange' : 'border-slate-800');
            
            let bgColor = isInside ? (name.includes('B') ? 'bg-basement' : 'bg-inside') : 
                          (name === "RIT救援區" ? 'bg-rit' : 
                          (name === "待命區" ? 'bg-staging' : 'bg-outside'));

            const btn = document.createElement('div');
            btn.className = `sector-btn p-3 w-full ${bgColor} ${statusClass}`;
            btn.onclick = (e) => { if(!e.target.closest('.draggable-team')) openModal(name); };
            btn.setAttribute('ondragover', 'event.preventDefault()');
            btn.setAttribute('ondrop', `handleDrop(event, '${name}')`);

            let content = `<div class="w-full flex justify-between items-center mb-2"><span class="text-[10px] font-black opacity-40 uppercase">${name}</span></div>`;
            teams.forEach(t => {
                const air = calculateAir(t);
                content += `<div class="draggable-team" draggable="true" ondragstart="event.dataTransfer.setData('uid', '${t.uid}')">
                    <div class="flex items-center justify-between">
                        <span class="text-[12px] font-black text-white"><span class="task-tag task-${taskMap[t.task]}">${taskMap[t.task]}</span>${t.leader}</span>
                        <span class="text-[15px] font-black font-mono ${t.usesAir?(air<=50?'text-red-500':'text-emerald-400'):'text-slate-500'}">${t.usesAir?air+'b':'---'}</span>
                    </div>
                </div>`;
            });
            btn.innerHTML = content + (teams.length? '': '<div class="text-[10px] opacity-10 mt-8 text-center w-full italic uppercase">STANDBY</div>');
            return btn;
        }

                        </div>
                        <input type="range" min="0" max="300" step="5" value="${airVal}" 
                               ontouchstart="event.stopPropagation()" onmousedown="event.stopPropagation()"
                               oninput="document.getElementById('update-air-val-${t.uid}').innerText = this.value + ' bar'"
                               onchange="updateAir('${t.uid}', this.value)" 
                               class="w-full h-3 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500">

        function editTeam(uid) {

            editingTeamUid = uid;

            document.getElementById('member-2-select').value = team.members[1] || "";

            document.getElementById('member-4-select').value = team.members[3] || "";

        function updateAir(uid, val) {
            const team = deployedTeams.find(t => t.uid === uid);
            if (team) {
                team.initialAir = parseInt(val);
                team.startTime = Date.now();
                team.n100 = (val <= 100); 
                team.n50 = (val <= 50);
                addLog("壓力更新", `📲 ${team.members.join('、')} 更新氣壓為 ${val}b`);

                closeModal();

        function setTask(t) {

            document.querySelectorAll('.task-btn').forEach(b => {

                    b.classList.add('active'); 
                } else { 
                    b.classList.remove('active'); 
                }
            });
            
            const airToggle = document.getElementById('air-toggle');
            if (['待命集結', '幕僚作業'].includes(t)) {
                airToggle.checked = false;

        function submitAssignment() {
            initAudioOnce();
            
            const l = document.getElementById('leader-select').value; 
            if (!l) { alert('請選擇帶隊官!'); return; }
            
            const ms = [l]; 
            ["member-2-select", "member-3-select", "member-4-select"].forEach(id => { 
                const v = document.getElementById(id).value; 
                if(v) ms.push(v); 
            });

            const usesAir = document.getElementById('air-toggle').checked;
            const initAir = parseInt(document.getElementById('new-air-slider').value);

            if (editingTeamUid) {
                const team = deployedTeams.find(t => t.uid === editingTeamUid);
                const oldMembers = team.members.join('、');
                const oldAirStr = getAirStatus(team); // 變更前的當下氣壓
                
                team.leader = l;
                team.members = ms;
                team.task = selectedTask;
                
                let airLog = "";
                if (team.usesAir !== usesAir) {
                    team.usesAir = usesAir;
                    airLog = usesAir ? ` (啟用氣瓶:${initAir}b)` : " (關閉氣瓶監控)";
                    if (usesAir) {
                        team.initialAir = initAir;
                        team.startTime = Date.now();
                        team.n100 = false; 
                        team.n50 = false;
                    }
                } else if (usesAir) {
                    team.initialAir = initAir;
                    team.startTime = Date.now();
                    airLog = ` (氣壓重置為:${initAir}b)`;
                }
                
                addLog("小組更新", `🔄 [${team.location}] ${oldMembers} ➔ ${ms.join('、')} (${selectedTask})${oldAirStr}${airLog}`); 
                
                editingTeamUid = null;
                const btn = document.getElementById('submit-btn');
                if(btn) {
                    btn.innerText = "DEPLOY / 確定部署";
                    btn.classList.replace('bg-orange-600', 'bg-blue-600');
                }
                renderMap(); 
                closeModal(); 
                return;
            }
            
            const uid = 't_' + Date.now();
            deployedTeams.push({ 
                uid, leader: l, members: ms, location: selectedSector, task: selectedTask, 
                usesAir: usesAir,
                initialAir: initAir, 
                startTime: Date.now(), n100: false, n50: false 
            });
            
            const airStr = usesAir ? ` (氣壓:${initAir}b)` : "";
            addLog("管制指派", `🚀 [${selectedSector}] 指派：${ms.join('、')} (${selectedTask})${airStr}`); 
            renderMap(); 
            closeModal(); 
        }

        function addLog(action, msg) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            logHistory.push({ time, action, msg });
            
            const logEl = document.createElement('div');
            logEl.className = "p-3 rounded-2xl bg-slate-800/50 border-l-4 border-blue-500 shadow-sm";
            logEl.innerHTML = `<span class="text-blue-400 font-black text-[10px]">[${time}]</span> <span class="text-white font-black">${action}</span><br><span class="text-slate-400">${msg}</span>`;
            document.getElementById('status-board').prepend(logEl);
        }

        function handleDrop(e, newLoc) {
            e.preventDefault();
            const uid = e.dataTransfer.getData('uid');
            const team = deployedTeams.find(t => t.uid === uid);
            
            if (team && team.location !== newLoc) {
                const old = team.location; 
                const airStr = getAirStatus(team); // 取得拖曳瞬間的氣壓
                team.location = newLoc;

                if (newLoc === "待命區") {
                    team.task = "待命集結";
                    team.usesAir = false;
                    addLog("安全撤出", `🔙 ${team.members.join('、')} 從 [${old}] 撤出至 [待命區]${airStr} (氣瓶解除)`);
                } else if (newLoc === "RIT救援區") {
                    team.task = "RIT";
                    addLog("位置變更", `📍 ${team.members.join('、')}：[${old}] ➔ [${newLoc}]${airStr}`); 
                } else {
                    addLog("位置變更", `📍 ${team.members.join('、')}：[${old}] ➔ [${newLoc}]${airStr}`); 
                }
                renderMap();
            }
        }

        function removeTeam(uid) {
            const idx = deployedTeams.findIndex(t => t.uid === uid);
            if (idx !== -1) {
                const team = deployedTeams[idx];
                const airStr = getAirStatus(team); // 取得徹底移除時的氣壓
                addLog("徹底收隊", `👋 ${team.members.join('、')} 已從現場移除${airStr}`);
                deployedTeams.splice(idx, 1);
                renderMap(); 
                closeModal();
            }
        }

        function renderMap() {
            ['pos-front', 'pos-back', 'pos-left', 'pos-right', 'pos-inside', 'pos-rit', 'pos-staging'].forEach(id => {
                if(document.getElementById(id)) document.getElementById(id).innerHTML = '';
            });
            
            document.getElementById('pos-front').appendChild(createBtn("第一面(前)", false));
            document.getElementById('pos-back').appendChild(createBtn("第三面(後)", false));
            document.getElementById('pos-left').appendChild(createBtn("第二面(左)", false));
            document.getElementById('pos-right').appendChild(createBtn("第四面(右)", false));
            
            if(document.getElementById('pos-rit')) document.getElementById('pos-rit').appendChild(createBtn("RIT救援區", false));
            if(document.getElementById('pos-staging')) document.getElementById('pos-staging').appendChild(createBtn("待命區", false));

            const inside = document.getElementById('pos-inside');
            inside.style.display = 'grid'; 
            inside.style.gridTemplateColumns = `repeat(${unitCount}, 1fr)`; 
            inside.style.gap = '8px';
            
            for (let f = floorCount; f >= 1; f--) {
                for (let u = 0; u < unitCount; u++) {
                    const label = (unitCount > 1 ? String.fromCharCode(65 + u) + '棟 ' : '') + f + 'F';
                    inside.appendChild(createBtn(label));
                }
            }
            for (let b = 1; b <= basementCount; b++) {
                for (let u = 0; u < unitCount; u++) {
                    const label = (unitCount > 1 ? String.fromCharCode(65 + u) + '棟 ' : '') + 'B' + b;
                    inside.appendChild(createBtn(label));
                }
            }

            let totalOnScene = 0;
            let standbyCount = 0;
            let deployedCount = 0;

            deployedTeams.forEach(t => {
                const count = t.members.length;
                totalOnScene += count;
                if (t.location === '待命區') {
                    standbyCount += count;
                } else {
                    deployedCount += count;
                }
            });

            if(document.getElementById('stat-total')) document.getElementById('stat-total').innerText = totalOnScene;
            if(document.getElementById('stat-standby')) document.getElementById('stat-standby').innerText = standbyCount;
            if(document.getElementById('stat-deployed')) document.getElementById('stat-deployed').innerText = deployedCount;
        }

        function showPersonnelList(type) {
            const modal = document.getElementById('personnel-modal');
            const title = document.getElementById('personnel-modal-title');
            const content = document.getElementById('personnel-modal-content');
            
            let filteredTeams = [];
            if (type === 'total') {
                title.innerText = "現場總人數名單";
                title.className = "text-xl font-black text-blue-400";
                filteredTeams = deployedTeams;
            } else if (type === 'standby') {
                title.innerText = "集結待命名單";
                title.className = "text-xl font-black text-emerald-400";
                filteredTeams = deployedTeams.filter(t => t.location === '待命區');
            } else if (type === 'deployed') {
                title.innerText = "熱區部署名單";
                title.className = "text-xl font-black text-red-400";
                filteredTeams = deployedTeams.filter(t => t.location !== '待命區');
            }

            if (filteredTeams.length === 0) {
                content.innerHTML = '<p class="text-center text-slate-500 font-bold py-8">目前無人員紀錄</p>';
            } else {
                content.innerHTML = filteredTeams.map(t => {
                    const isStandby = t.location === '待命區';
                    return `
                    <div class="bg-slate-800 p-4 rounded-2xl border ${isStandby ? 'border-emerald-500/30' : 'border-red-500/30'} shadow-lg mb-3">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-black text-white text-lg">${t.leader} 小組</span>
                            <span class="text-xs px-2 py-1 rounded bg-slate-900 font-bold ${isStandby ? 'text-emerald-400' : 'text-red-400'}">📍 ${t.location}</span>
                        </div>
                        <div class="text-[11px] text-slate-400 font-bold mb-1">任務：<span class="text-white">${t.task}</span></div>
                        <div class="text-[11px] text-slate-400 font-bold">隊員：<span class="text-slate-200">${t.members.join('、')}</span></div>
                    </div>`;
                }).join('');
            }
            
            modal.classList.remove('hidden');
        }

        function closePersonnelList() { 
            document.getElementById('personnel-modal').classList.add('hidden'); 
        }

        function toggleAirInput() { 
            document.getElementById('air-input-section').style.display = document.getElementById('air-toggle').checked ? 'block' : 'none'; 
        }
        
        function closeModal() { 
            document.getElementById('modal').classList.add('hidden'); 
            editingTeamUid = null; 
            const btn = document.getElementById('submit-btn'); 
            if(btn && btn.classList.contains('bg-orange-600')) { 
                btn.innerText = "DEPLOY / 確定部署"; 
                btn.classList.replace('bg-orange-600', 'bg-blue-600'); 
            } 
        }

        function adjustFloors(d) { 
            floorCount = Math.max(1, Math.min(10, floorCount + d)); 
            document.getElementById('floor-display').innerText = floorCount; 
            renderMap(); 
        }

        function adjustBasements(d) { 
            basementCount = Math.max(0, Math.min(5, basementCount + d)); 
            document.getElementById('basement-display').innerText = basementCount; 
            renderMap(); 
        }

        function adjustUnits(d) { 
            unitCount = Math.max(1, Math.min(5, unitCount + d)); 
            document.getElementById('unit-display').innerText = unitCount; 
            renderMap(); 
        }

        function exportLogs() { 
            let csv = "\uFEFF時間,動作,詳情\n"; 
            logHistory.forEach(r => csv += `"${r.time}","${r.action}","${r.msg}"\n`); 
            const blob = new Blob([csv], { type: 'text/csv' }); 
            const a = document.createElement("a"); 
            a.href = URL.createObjectURL(blob); 
            a.download = `FireLog_${Date.now()}.csv`; 
            a.click(); 
        }

        async function captureScreen() { 
            const canvas = await html2canvas(document.body, { backgroundColor: "#020617" }); 
            const a = document.createElement("a"); 
            a.href = canvas.toDataURL(); 
            a.download = `TacticalBoard_${Date.now()}.png`; 
            a.click(); 
        }

        setInterval(() => { 
            const clock = document.getElementById('current-clock'); 
            if (clock) clock.innerText = new Date().toLocaleTimeString([], {hour12: false}); 
            renderMap(); 
        }, 1000);

        window.onload = () => { 
            loadPersonnel(); 
            setTask('待命集結'); 
            renderMap(); 
        };

        function toggleManual() { 
            document.getElementById('manual-modal').classList.toggle('hidden'); 
        }

        // ================= 雲端自動同步邏輯 =================
        let lastSyncedLogIndex = 0; 
        async function syncToCloud() {
            if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL === '請貼上你的網頁應用程式網址') return;
            const logsToSync = logHistory.slice(lastSyncedLogIndex);
            if (logsToSync.length === 0) return; 

            const stats = { 
                total: document.getElementById('stat-total').innerText, 
                standby: document.getElementById('stat-standby').innerText, 
                deployed: document.getElementById('stat-deployed').innerText 
            };
            
            const payload = { 
                sessionName: SESSION_NAME, 
                logs: logsToSync, 
                stats: stats 
            };

            document.getElementById('sync-dot').className = 'w-2 h-2 rounded-full bg-yellow-400 animate-pulse';
            document.getElementById('sync-text').innerText = `同步中... (${SESSION_NAME})`;

            try {
                const response = await fetch(GAS_WEB_APP_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                    body: JSON.stringify(payload) 
                });
                const result = await response.json();
                
                if(result.status === 'success') {
                    lastSyncedLogIndex += logsToSync.length; 
                    document.getElementById('sync-dot').className = 'w-2 h-2 rounded-full bg-emerald-500';
                    document.getElementById('sync-text').innerText = `已同步 (${SESSION_NAME})`;
                }
            } catch (e) {
                document.getElementById('sync-dot').className = 'w-2 h-2 rounded-full bg-red-500';
                document.getElementById('sync-text').innerText = '同步失敗重試中';
            }
        }
        
        setInterval(syncToCloud, 30000); 

    </script>
    <script>
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) { 
        if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 67 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85) || (e.ctrlKey && e.keyCode === 83)) return false; 
    };
    document.addEventListener('selectstart', e => e.preventDefault());
    </script>
