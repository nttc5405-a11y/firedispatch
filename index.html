<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>火場戰術管制系統 - 實戰版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @keyframes blink-red { 0%, 100% { border-color: #ef4444; background-color: rgba(239, 68, 68, 0.4); } 50% { border-color: transparent; background-color: transparent; } }
        @keyframes blink-orange { 0%, 100% { border-color: #f59e0b; background-color: rgba(245, 158, 11, 0.3); } 50% { border-color: transparent; background-color: transparent; } }
        .warning-blink { animation: blink-red 1s infinite; border-width: 4px; }
        .report-blink { animation: blink-orange 1.5s infinite; border-width: 4px; }
        .sector-btn { transition: all 0.2s; min-height: 110px; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start; border-radius: 0.75rem; border-width: 2px; cursor: pointer; overflow: hidden; position: relative; }
        .drag-over { border: 2px dashed #3b82f6 !important; background-color: rgba(59, 130, 246, 0.3) !important; }
        body { background-color: #020617; color: #f8fafc; user-select: none; overflow-x: hidden; touch-action: manipulation; }
        .bg-inside { background-color: #1e293b; border-color: #334155; }
        .bg-outside { background-color: #064e3b; border-color: #065f46; }
        .grid-layout { display: grid; grid-template-columns: 80px 1fr 80px; gap: 12px; max-width: 650px; margin: 0 auto; }
        select { background-color: #0f172a !important; color: #ffffff !important; font-weight: bold; border: 1px solid #334155; padding: 8px; border-radius: 8px; width: 100%; appearance: none; }
        .draggable-team { cursor: grab; padding: 4px 6px; border-radius: 6px; width: 100%; background-color: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 4px; }
        .task-tag { padding: 1px 4px; border-radius: 3px; color: white; font-weight: 900; font-size: 9px; margin-right: 2px; text-shadow: 0 1px 1px rgba(0,0,0,0.5); }
        .task-滅 { background-color: #ef4444; } .task-搜 { background-color: #f97316; } .task-周 { background-color: #3b82f6; } 
        .task-侷 { background-color: #10b981; } .task-幕 { background-color: #a855f7; } .task-殘 { background-color: #92400e; } .task-排 { background-color: #06b6d4; }
        @media (max-width: 640px) { .grid-layout { grid-template-columns: 70px 1fr 70px; gap: 8px; } }
    </style>
</head>
<body class="p-4 font-sans pb-32">

    <div class="mb-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-red-500 italic uppercase">Tactical Fireboard</h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest">下為正面 (1st Face)</p>
        </div>
        <div class="flex gap-1">
            <button onclick="changeScene('bungalow')" id="btn-bungalow" class="px-2 py-1 bg-slate-800 rounded text-[10px] font-bold">平房</button>
            <button onclick="changeScene('building')" id="btn-building" class="px-2 py-1 bg-slate-800 rounded text-[10px] font-bold border border-blue-500">多層</button>
        </div>
    </div>

    <div id="control-panel" class="bg-slate-900/80 p-3 rounded-xl border border-slate-800 space-y-2 mb-4">
        <div class="flex justify-between items-center text-[10px] text-slate-500">
            <span>同步：<span id="sync-status" class="text-emerald-400">檢查網址...</span></span>
            <span id="current-clock" class="font-mono">00:00:00</span>
        </div>
        <div id="building-ctrls" class="space-y-2">
            <div class="flex items-center justify-between">
                <span class="text-[10px] text-slate-500 font-bold uppercase">Floor / 樓層</span>
                <div class="flex items-center gap-4">
                    <button onclick="adjustFloors(-1)" class="w-7 h-7 bg-slate-800 rounded-full">-</button>
                    <span id="floor-display" class="font-mono font-bold text-blue-400">3</span>
                    <button onclick="adjustFloors(1)" class="w-7 h-7 bg-slate-800 rounded-full">+</button>
                </div>
            </div>
            <div class="flex items-center justify-between border-t border-slate-800 pt-2">
                <span class="text-[10px] text-slate-500 font-bold uppercase">Units / 棟數</span>
                <div class="flex items-center gap-4">
                    <button onclick="adjustUnits(-1)" class="w-7 h-7 bg-slate-800 rounded-full">-</button>
                    <span id="unit-display" class="font-mono font-bold text-emerald-400">1</span>
                    <button onclick="adjustUnits(1)" class="w-7 h-7 bg-slate-800 rounded-full">+</button>
                </div>
            </div>
        </div>
    </div>

    <div id="capture-area" class="bg-slate-950 p-2 rounded-xl border border-slate-800">
        <div class="grid-layout">
            <div class="col-start-2 flex justify-center"><div id="pos-back" class="w-full"></div></div>
            <div class="row-start-2 flex items-center"><div id="pos-left" class="h-full flex flex-col justify-center"></div></div>
            <div class="row-start-2 col-start-2 bg-slate-950/50 rounded-2xl p-2 border border-slate-800 shadow-inner overflow-hidden"><div id="pos-inside"></div></div>
            <div class="row-start-2 col-start-3 flex items-center"><div id="pos-right" class="h-full flex flex-col justify-center"></div></div>
            <div class="col-start-2 flex justify-center"><div id="pos-front" class="w-full"></div></div>
        </div>
    </div>

    <div class="fixed bottom-4 left-4 right-4 z-40">
        <details class="group bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl overflow-hidden">
            <summary class="flex justify-between items-center p-4 cursor-pointer list-none hover:bg-slate-800">
                <div class="flex items-center gap-3">
                    <span class="text-sm font-bold text-slate-400">📋 全場紀錄</span>
                    <span id="team-count" class="bg-red-600 text-white text-[10px] px-2 py-0.5 rounded-full font-mono">0</span>
                    <div class="flex gap-1 ml-2">
                        <button onclick="exportLogs()" class="px-2 py-0.5 bg-slate-700 text-slate-300 text-[9px] rounded border border-slate-600">CSV</button>
                        <button onclick="captureScreen()" class="px-2 py-0.5 bg-blue-700 text-blue-100 text-[9px] rounded border border-blue-600">截圖</button>
                    </div>
                </div>
                <div class="text-slate-500 group-open:rotate-180">▼</div>
            </summary>
            <div id="status-board" class="p-4 max-h-48 overflow-y-auto space-y-1 border-t border-slate-800 bg-slate-950/50 text-[10px] font-mono text-slate-500"></div>
        </details>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden p-4 z-50">
        <div class="bg-slate-900 w-full max-w-md rounded-2xl border border-slate-700 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center p-6 border-b border-slate-800">
                <h3 class="text-lg font-bold text-white">📍 位置管理：<span id="target-sector" class="text-blue-400"></span></h3>
                <button onclick="closeModal()" class="text-slate-500 text-2xl">&times;</button>
            </div>
            <div class="p-6 overflow-y-auto space-y-6">
                <div id="current-teams-list" class="space-y-4"></div>
                <div class="pt-6 border-t border-slate-800 space-y-4">
                    <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700/50">
                        <select id="unit-select" onchange="updateMemberOptions()" class="mb-3"></select>
                        <div class="mb-3"><label class="text-[9px] text-blue-400 font-bold block mb-1">⭐ 帶隊官</label>
                        <select id="leader-select" onchange="updateMemberOptions()" style="border: 2px solid #3b82f6; background-color: rgba(59,130,246,0.1);"></select></div>
                        <div class="grid grid-cols-2 gap-2"><select id="member-2-select" onchange="updateMemberOptions()"></select><select id="member-3-select" onchange="updateMemberOptions()"></select></div>
                    </div>
                    <div class="space-y-2">
                        <div class="grid grid-cols-4 gap-2">
                            <button onclick="setTask('滅火攻擊')" id="btn-滅" class="task-btn py-3 bg-red-600/20 rounded-xl text-[10px] border-2 border-red-600/40 text-red-100 font-black">滅</button>
                            <button onclick="setTask('人命搜救')" id="btn-搜" class="task-btn py-3 bg-orange-600/20 rounded-xl text-[10px] border-2 border-orange-600/40 text-orange-100 font-black">搜</button>
                            <button onclick="setTask('周界防護')" id="btn-周" class="task-btn py-3 bg-blue-600/20 rounded-xl text-[10px] border-2 border-blue-600/40 text-blue-100 font-black">周</button>
                            <button onclick="setTask('侷限火勢')" id="btn-侷" class="task-btn py-3 bg-emerald-600/20 rounded-xl text-[10px] border-2 border-emerald-600/40 text-emerald-100 font-black">侷</button>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setTask('幕僚作業')" id="btn-幕" class="task-btn py-3 bg-purple-600/20 rounded-xl text-[10px] border-2 border-purple-600/40 text-purple-100 font-black">幕</button>
                            <button onclick="setTask('殘火處理')" id="btn-殘" class="task-btn py-3 bg-amber-800/20 rounded-xl text-[10px] border-2 border-amber-800/40 text-amber-100 font-black">殘</button>
                            <button onclick="setTask('通風排煙')" id="btn-排" class="task-btn py-3 bg-cyan-600/20 rounded-xl text-[10px] border-2 border-cyan-600/40 text-cyan-100 font-black">排</button>
                        </div>
                    </div>
                    <div class="flex items-center justify-between p-2 bg-slate-800/30 rounded-lg border border-slate-700/50">
                        <span class="text-xs text-slate-300">空氣氣瓶耗氣模式</span>
                        <input type="checkbox" id="air-toggle" checked onchange="toggleAirInput()">
                    </div>
                    <div id="air-input-section" class="flex flex-col gap-2">
                        <div class="flex justify-between text-[10px] text-slate-400 font-bold"><span>起始氣量</span><span id="new-air-val" class="text-emerald-400 font-mono">250b</span></div>
                        <input type="range" id="new-air-slider" min="0" max="300" step="10" value="250" oninput="document.getElementById('new-air-val').innerText=this.value+'b'" class="accent-red-500">
                    </div>
                    <button onclick="submitAssignment()" class="w-full py-4 bg-blue-600 rounded-xl font-bold text-white shadow-lg">確認指派並部署</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3K4j2T7zex1jjPzVPoWzf1HBflnE_nu2tzv9m_3BKJbovxgDAY5W9wea5RdWer8QXqEEDZEitCOGB/pub?output=csv';
        let personnelData = {}, currentScene = 'building', floorCount = 3, unitCount = 1, selectedSector = null, selectedTask = '滅火攻擊', deployedTeams = [], logHistory = [];
        const CONSUMPTION_PER_MIN = 10, WARNING_AIR = 50, REPORT_INTERVAL = 10 * 60 * 1000;
        const taskMap = { '滅火攻擊': '滅', '人命搜救': '搜', '通風排煙': '排', '周界防護': '周', '侷限火勢': '侷', '殘火處理': '殘', '幕僚作業': '幕' };

        async function loadPersonnel() {
            const statusEl = document.getElementById('sync-status');
            try {
                const res = await fetch(GOOGLE_SHEET_CSV_URL);
                const text = await res.text();
                personnelData = {};
                text.split(/\r?\n/).slice(1).forEach(r => {
                    const [u, n] = r.split(',');
                    if (u && n) {
                        if (!personnelData[u.trim()]) personnelData[u.trim()] = [];
                        personnelData[u.trim()].push(n.trim());
                    }
                });
                statusEl.innerText = "已同步雲端"; statusEl.className = "text-emerald-400";
            } catch (e) {
                personnelData = { "本地測試分隊": ["賴君瑋", "鍾昌霖", "蕭易林"] };
                statusEl.innerText = "本地名單"; statusEl.className = "text-amber-400";
            }
            populateUnitSelect();
        }

        function populateUnitSelect() {
            const select = document.getElementById('unit-select');
            select.innerHTML = `<option value="ALL">(所有單位)</option>` + Object.keys(personnelData).map(u => `<option value="${u}">${u}</option>`).join('');
            updateMemberOptions();
        }

        function updateMemberOptions() {
            const unit = document.getElementById('unit-select').value;
            const lS = document.getElementById('leader-select'), m2S = document.getElementById('member-2-select'), m3S = document.getElementById('member-3-select');
            const cL = lS.value, c2 = m2S.value, c3 = m3S.value;
            const globalDeployed = new Set(); deployedTeams.forEach(t => t.members.forEach(m => globalDeployed.add(m)));
            let pool = (unit === "ALL" ? [].concat(...Object.values(personnelData)) : personnelData[unit] || []).filter(n => !globalDeployed.has(n));

            const render = (el, cur, others) => {
                let opts = [...pool]; if (cur && !opts.includes(cur)) opts.push(cur);
                opts = opts.filter(n => !others.includes(n));
                el.innerHTML = `<option value="">(選擇人員)</option>` + opts.map(n => `<option value="${n}">${el.id==='leader-select'?'⭐ ':''}${n}</option>`).join('');
                el.value = cur;
            };
            render(lS, cL, [c2, c3]); render(m2S, c2, [cL, c3]); render(m3S, c3, [cL, c2]);
        }

        function calculateAir(team) {
            if (!team.usesAir) return null;
            const current = Math.max(0, team.initialAir - Math.floor((Date.now() - team.startTime) / 60000 * CONSUMPTION_PER_MIN));
            if (current <= 100 && !team.n100) { addLog("警告", `${team.leader} 壓力<100b`); team.n100 = true; }
            if (current <= 50 && !team.n50) { addLog("緊急", `${team.leader} 壓力<50b!`); team.n50 = true; }
            return current;
        }

        function createBtn(name, isInside = true) {
            const teams = deployedTeams.filter(t => t.location === name);
            let crit = teams.some(t => t.usesAir && calculateAir(t) <= WARNING_AIR);
            let remind = teams.some(t => (Date.now() - t.lastReport) >= REPORT_INTERVAL);
            const btn = document.createElement('div');
            btn.className = `sector-btn p-2 w-full ${isInside ? 'bg-inside' : 'bg-outside'} ${crit ? 'warning-blink' : (remind ? 'report-blink' : 'border-slate-700/50')}`;
            btn.setAttribute('ondragover', 'event.preventDefault(); this.classList.add("drag-over");');
            btn.setAttribute('ondragleave', 'this.classList.remove("drag-over");');
            btn.setAttribute('ondrop', `handleDrop(event, '${name}')`);
            btn.onclick = (e) => { if(!e.target.closest('.draggable-team')) openModal(name); };

            btn.innerHTML = `<div class="w-full flex justify-between items-center mb-1"><span class="text-[7px] font-black opacity-30 uppercase">${name}</span><span class="text-[9px] opacity-20">⚙️</span></div>` +
                `<div class="w-full overflow-hidden">` + teams.map(t => {
                    const air = calculateAir(t); const airDisp = t.usesAir ? `${air}b` : '---';
                    const idx = deployedTeams.indexOf(t); const overdue = (Date.now() - t.lastReport) >= REPORT_INTERVAL;
                    return `<div class="draggable-team" draggable="true" ondragstart="event.dataTransfer.setData('idx', ${idx})">` +
                        `<div class="flex items-center justify-between text-[9px] font-bold"><span><span class="task-tag task-${taskMap[t.task]}">${taskMap[t.task]}</span>${t.leader}${t.members.length>1?'+'+(t.members.length-1):''}</span>` +
                        `<span class="${t.usesAir && air <= 50 ? 'text-red-500 animate-pulse' : (overdue ? 'text-amber-500' : 'text-emerald-400')}">${airDisp}</span></div>` +
                        (t.usesAir ? `<div class="w-full h-[2px] bg-slate-700 rounded-full mt-1"><div style="background-color:${air<=50?'#ef4444':(air<=100?'#f59e0b':'#10b981')}; width:${(air/300)*100}%" class="h-full rounded-full transition-all"></div></div>` : '') + `</div>`;
                }).join('') + (teams.length? '': '<div class="text-[10px] opacity-10 mt-4 text-center w-full">...</div>') + `</div>`;
            return btn;
        }

        function handleDrop(e, newLoc) {
            e.preventDefault(); e.currentTarget.classList.remove('drag-over');
            const idx = e.dataTransfer.getData('idx'); if (!deployedTeams[idx]) return;
            if (deployedTeams[idx].location !== newLoc) {
                const old = deployedTeams[idx].location; deployedTeams[idx].location = newLoc;
                addLog("移動", `${deployedTeams[idx].leader} ${old} ➔ ${newLoc}`); renderMap();
            }
        }

        function renderMap() {
            ['pos-front', 'pos-back', 'pos-left', 'pos-right', 'pos-inside'].forEach(id => document.getElementById(id).innerHTML = '');
            document.getElementById('pos-front').appendChild(createBtn("第一面(前)", false));
            document.getElementById('pos-back').appendChild(createBtn("第三面(後)", false));
            document.getElementById('pos-left').appendChild(createBtn("第二面(左)", false));
            document.getElementById('pos-right').appendChild(createBtn("第四面(右)", false));
            const inside = document.getElementById('pos-inside');
            if (currentScene === 'bungalow') {
                inside.className = "grid grid-cols-2 gap-2"; ["後左", "後右", "前左", "前右"].forEach(q => inside.appendChild(createBtn(q)));
            } else {
                inside.style.display = 'grid'; inside.style.gridTemplateColumns = `repeat(${unitCount}, 1fr)`; inside.style.gap = '8px';
                for (let f = floorCount; f >= 1; f--) {
                    const fl = f === floorCount && floorCount > 1 ? '頂樓(R)' : (f === 1 ? '1F' : f+'F');
                    for (let u = 0; u < unitCount; u++) inside.appendChild(createBtn(`${unitCount > 1 ? String.fromCharCode(65 + u) + '棟 ' : ''}${fl}`));
                }
            }
            document.getElementById('team-count').innerText = deployedTeams.length;
        }

        function openModal(name) {
            selectedSector = name; document.getElementById('target-sector').innerText = name; document.getElementById('modal').classList.remove('hidden');
            updateMemberOptions(); const list = document.getElementById('current-teams-list'); const teams = deployedTeams.filter(t => t.location === name);
            list.innerHTML = teams.length === 0 ? '<p class="text-xs text-slate-600 text-center italic py-2">無人員於此位置</p>' : 
                teams.map(t => `<div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">` +
                    `<div class="flex justify-between items-center mb-1"><span class="font-bold text-white"><span class="task-tag task-${taskMap[t.task]}">${taskMap[t.task]}</span> ${t.leader}</span>` +
                    `<button onclick="deployedTeams.splice(deployedTeams.indexOf(${JSON.stringify(t)}),1); closeModal(); renderMap();" class="text-[10px] text-red-400 underline">撤離</button></div>` +
                    `<div class="text-[9px] text-slate-500 mb-3">成員: ${t.members.join(', ')}</div>` +
                    (t.usesAir ? `<div class="flex flex-col gap-2"><div class="flex justify-between text-[11px] text-slate-400"><span>更新氣量(重置提醒)</span><span class="font-mono text-emerald-400 font-bold">${calculateAir(t)}b</span></div>` +
                        `<input type="range" min="0" max="300" step="5" value="${calculateAir(t)}" onchange="updateAir(deployedTeams.indexOf(this.dataset.t), this.value)" data-t='${JSON.stringify(t)}' class="w-full h-2 accent-blue-500"></div>` : `<div class="text-[10px] text-slate-500 italic">非耗氣模式</div>`) + `</div>`).join('');
        }

        function updateAir(idx, val) { 
            const t = deployedTeams[idx]; t.initialAir = parseInt(val); t.startTime = t.lastReport = Date.now(); t.n100 = (val<=100); t.n50 = (val<=50);
            addLog("更新", `${t.leader} 氣量為 ${val}b`); renderMap(); closeModal();
        }

        function submitAssignment() {
            const l = document.getElementById('leader-select').value; if (!l) return;
            const ms = [l]; ["member-2-select", "member-3-select"].forEach(id => { if(document.getElementById(id).value) ms.push(document.getElementById(id).value); });
            deployedTeams.push({ leader: l, members: ms, location: selectedSector, task: selectedTask, usesAir: document.getElementById('air-toggle').checked, initialAir: parseInt(document.getElementById('new-air-slider').value), startTime: Date.now(), lastReport: Date.now(), n100: false, n50: false });
            addLog("指派", `${l} 等 ${ms.length} 人 ➔ ${selectedSector} (${selectedTask})`); closeModal(); renderMap();
        }

        function addLog(action, msg) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            logHistory.push({ time, action, msg: msg.replace(/<[^>]*>?/gm, '') });
            const log = document.createElement('div'); log.className = "mb-1 border-b border-white/5 pb-1";
            log.innerHTML = `<span class="text-blue-500">[${time}]</span> <span class="text-slate-300 font-bold">${action}:</span> ${msg}`;
            document.getElementById('status-board').prepend(log);
        }

        function exportLogs() {
            if (!logHistory.length) return;
            let csv = "\uFEFF時間,動作,詳情\n"; logHistory.forEach(r => csv += `"${r.time}","${r.action}","${r.msg}"\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const url = URL.createObjectURL(blob);
            const link = document.createElement("a"); link.href = url; link.download = `fire_log_${Date.now()}.csv`; link.click();
        }

        async function captureScreen() {
            const el = document.getElementById('capture-area');
            const canvas = await html2canvas(el, { backgroundColor: "#020617", scale: 2 });
            const link = document.createElement("a"); link.href = canvas.toDataURL("image/png"); link.download = `scene_${Date.now()}.png`; link.click();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function setTask(t) { selectedTask = t; document.querySelectorAll('.task-btn').forEach(b => { const act = b.innerText.includes(taskMap[t]); b.style.opacity = act?"1":"0.3"; b.style.borderColor = act?"white":"transparent"; }); }
        function toggleAirInput() { const chk = document.getElementById('air-toggle').checked; document.getElementById('air-input-section').style.opacity = chk?"1":"0.3"; document.getElementById('air-input-section').style.pointerEvents = chk?"auto":"none"; }
        function changeScene(t) { currentScene = t; document.querySelectorAll('.scene-btn').forEach(b => b.classList.toggle('border-blue-500', b.innerText.includes(t==='bungalow'?'平房':'多層'))); renderMap(); }
        function adjustFloors(d) { floorCount = Math.max(1, Math.min(10, floorCount + d)); document.getElementById('floor-display').innerText = floorCount; renderMap(); }
        function adjustUnits(d) { unitCount = Math.max(1, Math.min(5, unitCount + d)); document.getElementById('unit-display').innerText = unitCount; renderMap(); }

        setInterval(() => { document.getElementById('current-clock').innerText = new Date().toLocaleTimeString(); renderMap(); }, 1000);
        window.onload = () => { loadPersonnel(); setTask('滅火攻擊'); changeScene('building'); };
    </script>
</body>
