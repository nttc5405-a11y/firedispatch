<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>火場人員管制系統 - ICS 實戰版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @keyframes pulse-red {
            0%, 100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; background-color: rgba(239, 68, 68, 0.4); }
            50% { border-color: #ffffff; box-shadow: 0 0 30px #ff0000; background-color: rgba(239, 68, 68, 0.1); }
        }
        @keyframes pulse-orange {
            0%, 100% { border-color: #f59e0b; box-shadow: 0 0 10px #f59e0b; }
            50% { border-color: #ffffff; box-shadow: 0 0 20px #f59e0b; }
        }
        .warning-red { animation: pulse-red 1.5s infinite; border-width: 4px !important; }
        .warning-orange { animation: pulse-orange 2s infinite; border-width: 4px !important; }

        body { background-color: #020617; color: #f8fafc; user-select: none; overflow-x: hidden; touch-action: manipulation; }
        
        select { 
            background-color: #1e293b !important; 
            color: #ffffff !important; 
            border: 2px solid #3b82f6 !important; 
            padding: 12px !important;
            font-size: 16px !important; 
            font-weight: 900 !important;
            border-radius: 12px;
            width: 100%;
            display: block;
            appearance: auto !important;
        }
        optgroup { background-color: #0f172a; color: #60a5fa; font-style: normal; font-weight: 900; }

        .sector-btn { transition: all 0.2s; min-height: 120px; border-radius: 1rem; border-width: 2px; cursor: pointer; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .bg-inside { background-color: #111827; border-color: #374151; }
        .bg-outside { background-color: #064e3b; border-color: #065f46; }
        .bg-rit { background-color: #450a0a; border-color: #991b1b; border-style: dashed; }
        .bg-basement { background-color: #1f2937; border-color: #4b5563; }
        .bg-staging { background-color: #0f172a; border-color: #3b82f6; border-style: dashed; }

        .draggable-team { cursor: grab; padding: 6px; border-radius: 8px; background-color: rgba(0, 0, 0, 0.85); border: 1px solid rgba(255, 255, 255, 0.3); margin-bottom: 4px; }
        .task-tag { padding: 2px 5px; border-radius: 4px; color: white; font-weight: 900; font-size: 10px; margin-right: 4px; }
        
        .task-btn { transition: all 0.2s; opacity: 0.4; border-width: 2px; border-color: transparent; }
        .task-btn.active { opacity: 1 !important; border-color: white !important; transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        .task-滅 { background-color: #ef4444; } .task-搜 { background-color: #f97316; } .task-排 { background-color: #06b6d4; }
        .task-周 { background-color: #3b82f6; } .task-侷 { background-color: #10b981; } .task-殘 { background-color: #92400e; }
        .task-幕 { background-color: #a855f7; } .task-RIT { background-color: #ff0000; border: 1px solid white; }
        .task-待 { background-color: #64748b; border: 1px dashed white; color: #fff; }

        .grid-layout { display: grid; grid-template-columns: 90px 1fr 90px; gap: 12px; width: 100%; max-width: 850px; }
    </style>
</head>
<body class="flex flex-col lg:flex-row h-screen" onclick="initAudioOnce()">

    <div class="flex-1 flex flex-col p-4 overflow-y-auto">
        
        <div class="mb-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-red-500 italic tracking-tighter flex items-center gap-3">
                    TACTICAL COMMAND
                    <span id="current-clock" class="bg-slate-800 px-3 py-1 rounded-lg text-white font-mono text-sm shadow-inner tracking-widest border border-slate-700">--:--:--</span>
                </h1>
                <p id="sync-status" class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest mb-2 mt-1">● CHENGGONG FIRE UNIT CONNECTED</p>
                
                <div class="flex gap-2 mt-1 flex-wrap">
                    <div onclick="showPersonnelList('total')" class="cursor-pointer hover:bg-slate-800 active:scale-95 transition-all bg-slate-900 border border-blue-900/50 px-3 py-1 rounded-lg flex items-center gap-2 shadow-inner">
                        <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                        <span class="text-[10px] text-slate-400 font-black tracking-widest">現場總數 <span id="stat-total" class="text-blue-400 font-mono text-base ml-1">0</span></span>
                    </div>
                    <div onclick="showPersonnelList('standby')" class="cursor-pointer hover:bg-slate-800 active:scale-95 transition-all bg-slate-900 border border-emerald-900/50 px-3 py-1 rounded-lg flex items-center gap-2 shadow-inner">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span class="text-[10px] text-slate-400 font-black tracking-widest">集結待命 <span id="stat-standby" class="text-emerald-400 font-mono text-base ml-1">0</span></span>
                    </div>
                    <div onclick="showPersonnelList('deployed')" class="cursor-pointer hover:bg-slate-800 active:scale-95 transition-all bg-slate-900 border border-red-900/50 px-3 py-1 rounded-lg flex items-center gap-2 shadow-inner">
                        <span class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]"></span>
                        <span class="text-[10px] text-slate-400 font-black tracking-widest">熱區部署 <span id="stat-deployed" class="text-red-400 font-mono text-base ml-1">0</span></span>
                    </div>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleManual()" class="w-10 h-10 bg-slate-800 hover:bg-slate-700 rounded-xl flex items-center justify-center border border-slate-700 shadow-lg">
                    <span class="text-blue-400 font-bold">？</span>
                </button>
                <button onclick="triggerMayday()" class="px-6 py-2 bg-red-600 hover:bg-red-500 rounded-xl text-xs font-black shadow-lg shadow-red-600/50 active:scale-95 transition-all">🚨 MAYDAY</button>
            </div>
        </div>

        <div class="bg-slate-900/90 p-3 rounded-xl border border-slate-700 mb-4 flex flex-col gap-3 shadow-md">
            <div class="flex gap-2 items-center flex-wrap justify-between">
                <div class="flex gap-2 items-center flex-1 min-w-[200px]">
                    <span class="text-xs text-slate-400 font-bold whitespace-nowrap">案件編號</span>
                    <input type="text" id="incident-id-input" placeholder="例: 032801 (將做為存檔分頁名)" onchange="updateSessionName()" class="bg-slate-950 border border-slate-600 px-3 py-1.5 rounded-lg text-blue-400 font-mono text-sm w-full font-black focus:outline-none focus:border-blue-500 shadow-inner placeholder-slate-700">
                </div>
                <div class="flex gap-2 flex-wrap">
                    <button id="toggle-roster-btn" onclick="toggleRoster()" class="hidden bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg text-xs font-black text-white shadow-lg active:scale-95 transition-all">
                        🔼 收合名單
                    </button>
                    <button onclick="fetchDutyRoster()" class="bg-blue-700 hover:bg-blue-600 px-4 py-1.5 rounded-lg text-xs font-black text-white shadow-lg active:scale-95 transition-all flex items-center gap-1">
                        🔄 載入上班名冊
                    </button>
                    <button onclick="startScanner()" class="bg-emerald-700 hover:bg-emerald-600 px-4 py-1.5 rounded-lg text-xs font-black text-white shadow-lg active:scale-95 transition-all flex items-center gap-1">
                        📷 掃碼報到
                    </button>
                </div>
            </div>
            <div id="roster-container" class="flex flex-wrap gap-2 items-center p-2 bg-slate-950 rounded-lg border border-slate-800 min-h-[40px]">
                <span class="text-[10px] text-slate-500 italic">點擊上方按鈕載入「本單位今日出勤人員」...</span>
            </div>
        </div>

        <div class="bg-slate-900/90 p-2 rounded-xl border border-slate-700 mb-4 flex flex-wrap gap-2 justify-between items-center shadow-md">
            <div class="flex gap-2 flex-wrap">
                <div class="flex items-center bg-slate-950 rounded-lg px-2 py-1 border border-slate-800">
                    <span class="text-[10px] text-slate-500 font-black mr-2">地上(F)</span>
                    <button onclick="adjustFloors(-1)" class="text-slate-400 hover:text-white px-2 font-black">-</button>
                    <span id="floor-display" class="font-mono text-sm font-black text-blue-400 w-4 text-center">1</span>
                    <button onclick="adjustFloors(1)" class="text-slate-400 hover:text-white px-2 font-black">+</button>
                </div>
                <div class="flex items-center bg-slate-950 rounded-lg px-2 py-1 border border-slate-800">
                    <span class="text-[10px] text-slate-500 font-black mr-2">地下(B)</span>
                    <button onclick="adjustBasements(-1)" class="text-slate-400 hover:text-white px-2 font-black">-</button>
                    <span id="basement-display" class="font-mono text-sm font-black text-purple-400 w-4 text-center">0</span>
                    <button onclick="adjustBasements(1)" class="text-slate-400 hover:text-white px-2 font-black">+</button>
                </div>
                <div class="flex items-center bg-slate-950 rounded-lg px-2 py-1 border border-slate-800">
                    <span class="text-[10px] text-slate-500 font-black mr-2">棟數(U)</span>
                    <button onclick="adjustUnits(-1)" class="text-slate-400 hover:text-white px-2 font-black">-</button>
                    <span id="unit-display" class="font-mono text-sm font-black text-emerald-400 w-4 text-center">1</span>
                    <button onclick="adjustUnits(1)" class="text-slate-400 hover:text-white px-2 font-black">+</button>
                </div>
            </div>
            
            <div id="cloud-sync-status" class="flex items-center gap-1.5 px-2 border-l border-slate-700">
                <span class="w-2 h-2 rounded-full bg-slate-500 shrink-0" id="sync-dot"></span>
                <span class="text-[10px] text-slate-400 font-bold whitespace-nowrap" id="sync-text">尚未啟用同步</span>
            </div>
        </div>

        <div id="capture-area" class="flex-1 flex items-center justify-center p-2">
            <div class="grid-layout">
                <div class="col-start-2"><div id="pos-back"></div></div>
                <div class="row-start-2 flex items-center"><div id="pos-left" class="w-full"></div></div>
                <div class="row-start-2 col-start-2 p-2 bg-slate-950/30 rounded-3xl border border-slate-800 shadow-inner overflow-hidden"><div id="pos-inside"></div></div>
                <div class="row-start-2 col-start-3 flex items-center"><div id="pos-right" class="w-full"></div></div>
                
                <div class="col-start-1 row-start-3 mt-4 flex items-end"><div id="pos-rit" class="w-full"></div></div>
                <div class="col-start-2 mt-4 row-start-3"><div id="pos-front"></div></div>
                <div class="col-start-3 row-start-3 mt-4 flex items-end"><div id="pos-staging" class="w-full"></div></div>
            </div>
        </div>
    </div>

    <div class="w-full lg:w-96 bg-slate-900 border-l border-slate-800 flex flex-col shadow-2xl">
        <details class="group lg:flex lg:flex-col lg:h-full" open>
            <summary class="flex justify-between items-center p-4 bg-slate-950 cursor-pointer list-none border-b border-slate-800 lg:cursor-default">
                <div class="flex items-center gap-3">
                    <h2 class="font-black text-sm tracking-widest text-slate-400 uppercase">📋 Live Incident Log</h2>
                </div>
                <span class="text-slate-500 transition-transform group-open:rotate-180 lg:hidden">▼</span>
            </summary>
            <div class="flex flex-col h-[30vh] lg:h-[calc(100vh-130px)]">
                <div id="status-board" class="flex-1 overflow-y-auto p-4 space-y-3 font-mono text-[11px] leading-relaxed bg-slate-950/50"></div>
                <div class="p-4 bg-slate-950 border-t border-slate-800 grid grid-cols-2 gap-2">
                    <button onclick="exportLogs()" class="py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-xs font-black border border-slate-700 transition-colors">匯出 CSV</button>
                    <button onclick="captureScreen()" class="py-3 bg-blue-700 hover:bg-blue-600 text-white rounded-xl text-xs font-black border border-blue-600 transition-colors">戰術截圖</button>
                </div>
            </div>
        </details>
    </div>

    <div id="personnel-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden p-4 z-[70]">
        <div class="bg-slate-900 w-full max-w-md rounded-[2.5rem] border border-slate-700 shadow-2xl flex flex-col max-h-[85vh] overflow-hidden">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-950">
                <div>
                    <h3 id="personnel-modal-title" class="text-xl font-black text-white">名單</h3>
                    <p class="text-[10px] text-slate-500 uppercase">Personnel List</p>
                </div>
                <button onclick="closePersonnelList()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-800 text-white text-2xl hover:bg-slate-700 transition-colors">&times;</button>
            </div>
            <div id="personnel-modal-content" class="p-6 overflow-y-auto space-y-4"></div>
        </div>
    </div>

    <div id="scanner-modal" class="fixed inset-0 bg-black/95 z-[80] hidden flex flex-col items-center justify-center p-4">
        <h3 class="text-white font-black text-xl mb-4">📷 請掃描人員管制卡</h3>
        <div id="reader" class="w-full max-w-sm bg-black rounded-2xl overflow-hidden border-2 border-emerald-500 shadow-[0_0_20px_#10b981]"></div>
        
        <div id="scan-result" class="text-emerald-400 font-black text-2xl mt-6 h-8 transition-opacity duration-300 opacity-0 tracking-widest drop-shadow-[0_0_10px_rgba(16,185,129,0.8)]"></div>
        
        <p class="text-slate-400 mt-4 text-xs font-bold">支援連續掃描，成功時會出現提示音與綠字</p>
        <button onclick="stopScanner()" class="mt-8 px-8 py-3 bg-red-600 text-white font-black rounded-xl shadow-lg active:scale-95 transition-all">關閉相機</button>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden p-4 z-50">
        <div class="bg-slate-900 w-full max-w-md rounded-[2.5rem] border border-slate-700 shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-950">
                <h3 class="text-xl font-black text-white" id="target-title">位置管理</h3>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-800 text-white text-2xl">&times;</button>
            </div>
            
            <div class="p-6 overflow-y-auto space-y-6">
                <div id="current-teams-list" class="space-y-4"></div>
                <div class="pt-6 border-t border-slate-800 space-y-4">
                    <div class="bg-slate-950 p-5 rounded-3xl border border-slate-800 space-y-5">
                        
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-[10px] text-slate-500 font-black">單位與帶隊官</label>
                            <button onclick="addCustomPersonnel()" class="text-[10px] bg-slate-800 hover:bg-slate-700 text-blue-400 px-3 py-1 rounded border border-slate-700 shadow transition-colors">➕ 臨時建置</button>
                        </div>
                        
                        <div class="space-y-2 mt-0">
                            <select id="unit-select" onchange="updateMemberOptions()" class="mb-2"></select>
                            <select id="leader-select" onchange="updateMemberOptions()"></select>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <select id="member-2-select" onchange="updateMemberOptions()"></select>
                            <select id="member-3-select" onchange="updateMemberOptions()"></select>
                            <select id="member-4-select" onchange="updateMemberOptions()"></select>
                        </div>
                        
                        <div class="space-y-2">
                            <div class="flex flex-wrap gap-2 justify-center">
                                <button onclick="setTask('滅火攻擊')" id="btn-滅" class="task-btn flex-1 min-w-[70px] py-3 rounded-xl text-[10px] font-black bg-red-600 text-red-100">滅</button>
                                <button onclick="setTask('人命搜救')" id="btn-搜" class="task-btn flex-1 min-w-[70px] py-3 rounded-xl text-[10px] font-black bg-orange-600 text-orange-100">搜</button>
                                <button onclick="setTask('通風排煙')" id="btn-排" class="task-btn flex-1 min-w-[70px] py-3 rounded-xl text-[10px] font-black bg-cyan-600 text-cyan-100">排</button>
                                <button onclick="setTask('周界防護')" id="btn-周" class="task-btn flex-1 min-w-[70px] py-3 rounded-xl text-[10px] font-black bg-blue-600 text-blue-100">周</button>
                                <button onclick="setTask('侷限火勢')" id="btn-侷" class="task-btn flex-1 min-w-[70px] py-3 rounded-xl text-[10px] font-black bg-emerald-600 text-emerald-100">侷</button>
                                <button onclick="setTask('殘火處理')" id="btn-殘" class="task-btn flex-1 min-w-[70px] py-3 rounded-xl text-[10px] font-black bg-amber-800 text-amber-100">殘</button>
                                <button onclick="setTask('幕僚作業')" id="btn-幕" class="task-btn flex-1 min-w-[70px] py-3 rounded-xl text-[10px] font-black bg-purple-600 text-purple-100">幕</button>
                                <button onclick="setTask('RIT')" id="btn-RIT" class="task-btn flex-1 min-w-[70px] py-3 rounded-xl text-[10px] font-black bg-red-900 text-red-200">RIT</button>
                                <button onclick="setTask('待命集結')" id="btn-待" class="task-btn flex-1 min-w-[70px] py-3 rounded-xl text-[10px] font-black bg-slate-600 text-slate-100">待命</button>
                            </div>
                        </div>

                        <div class="flex items-center justify-between p-3 bg-slate-900 rounded-xl border border-slate-800">
                            <span class="text-xs text-slate-300 font-bold">氣瓶監控模式</span>
                            <input type="checkbox" id="air-toggle" checked onchange="toggleAirInput()" class="w-6 h-6 accent-blue-500">
                        </div>

                        <div id="air-input-section" class="space-y-3">
                            <div class="flex justify-between font-black text-[10px]">
                                <span class="text-slate-500 uppercase">START PRESSURE</span>
                                <span id="new-air-val" class="text-emerald-400 text-sm font-mono">250 bar</span>
                            </div>
                            <input type="range" id="new-air-slider" min="0" max="300" step="10" value="250" 
                                   ontouchstart="event.stopPropagation()" onmousedown="event.stopPropagation()"
                                   oninput="document.getElementById('new-air-val').innerText=this.value+' bar'" 
                                   class="w-full accent-blue-500">
                        </div>
                    </div>
                    <button id="submit-btn" onclick="submitAssignment()" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl shadow-2xl active:scale-95 transition-all text-lg">DEPLOY / 確定部署</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🚨 記得把這裡替換成你的 Google Apps Script 網址！ 🚨
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzyria_wPsV2xX4lzWQOBBSo5jIWRvEbcUMdXse5IfQEHbsJH_gJWJhwDv6xDlfFdlMVQ/exec'; 

        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3K4j2T7zex1jjPzVPoWzf1HBflnE_nu2tzv9m_3BKJbovxgDAY5W9wea5RdWer8QXqEEDZEitCOGB/pub?output=csv';
        let personnelData = {}, floorCount = 1, basementCount = 0, unitCount = 1, selectedSector = null, selectedTask = '滅火攻擊', deployedTeams = [], logHistory = [];
        let editingTeamUid = null; 
        const CONSUMPTION_PER_MIN = 10;
        const taskMap = { '滅火攻擊': '滅', '人命搜救': '搜', '通風排煙': '排', '周界防護': '周', '侷限火勢': '侷', '殘火處理': '殘', '幕僚作業': '幕', 'RIT': 'RIT', '待命集結': '待' };

        // ================= 案件編號邏輯 =================
        const d = new Date();
        let SESSION_NAME = '火警_' + 
            String(d.getMonth()+1).padStart(2, '0') + 
            String(d.getDate()).padStart(2, '0') + '_' + 
            String(d.getHours()).padStart(2, '0') + 
            String(d.getMinutes()).padStart(2, '0');
            
        document.getElementById('incident-id-input').value = SESSION_NAME; // 預設填入當前時間

        function updateSessionName() {
            const input = document.getElementById('incident-id-input').value.trim();
            if (input) {
                SESSION_NAME = input;
                addLog("系統", `📝 案件編號設定為: ${SESSION_NAME}`);
            }
        }

        // ================= 音效與語音處理 =================
        let audioCtx;
        function initAudioOnce() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const buffer = audioCtx.createBuffer(1, 1, 22050);
                const source = audioCtx.createBufferSource();
                source.buffer = buffer; 
                source.connect(audioCtx.destination); 
                source.start(0);
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
